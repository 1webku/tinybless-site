<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<title>Infografis IPA - TinyBless Edu</title>

<style>

body{
font-family:Arial, sans-serif;
background:#0b2e36;
color:white;
text-align:center;
padding:40px;
}

h1{
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
max-width:900px;
margin:auto;
}

.card{
background:white;
color:#333;
border-radius:12px;
padding:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.card img{
width:100%;
border-radius:8px;
}

.card h3{
margin-top:15px;
}

.button{
display:inline-block;
margin-top:10px;
padding:10px 16px;
background:#0b2e36;
color:white;
border-radius:20px;
text-decoration:none;
}

.button:hover{
background:#154c59;
}

a.back{
display:block;
margin-top:40px;
color:#00ffd5;
text-decoration:none;
}

</style>

</head>

<body>

<h1>Infografis IPA</h1>

<div class="grid">

<div class="card">
<img src="../../img/ipa/perubahan-wujud-zat.png">
<h3>Perubahan Wujud Zat</h3>
<p>Proses perubahan zat dari padat, cair, hingga gas.</p>
<a class="button" href="perubahan-wujud-zat.html">Buka Materi</a>
</div>

<div class="card">
<img src="../../img/ipa/siklus-air.png">
<h3>Siklus Air</h3>
<p>Proses perputaran air di bumi melalui penguapan dan hujan.</p>
<a class="button" href="siklus-air.html">Buka Materi</a>
</div>

<div class="card">
<img src="../../img/ipa/gaya-dan-gerak.png">
<h3>Gaya dan Gerak</h3>
<p>Konsep gaya yang mempengaruhi gerak benda.</p>
<a class="button" href="gaya-dan-gerak.html">Buka Materi</a>
</div>

</div>

<a class="back" href="/">← Kembali ke Beranda</a>

</body>
</html>
