body{

}

p.desc{

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
max-width:900px;
margin:40px auto;
padding:0 15px;
}

/* CARD */

.card{
background:white;
color:#333;
padding:25px;

}

.card:hover{
transform:translateY(-5px);
}

.card h2{
margin-bottom:10px;
}

.card p{
font-size:14px;
margin-bottom:15px;
}

/* BUTTON */

.button{
display:inline-block;
padding:10px 20px;
background:#203a43;

text-decoration:none;

}

.button:hover{
background:#2c5364;
}

/* BACK */

.back{
display:block;
margin-top:40px;
color:#00ffd5;
text-decoration:none;
}

</style>
