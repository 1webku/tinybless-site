<!DOCTYPE html>

<html>
<head>

<style>

body{

background:#0f2027;
color:white;

}

.grid{

.card img{

}  
  
.button{

padding:10px 20px;

</style>

</head>

<body>

<h1>Infografis Edukasi</h1>

<p>Belajar IPA, Fisika, dan Biologi dengan infografis sederhana.</p>

<div class="grid">

</div>

<div class="card">
<h2>Fisika</h2>
<p>Infografis konsep fisika sederhana.</p>

<div class="card">
<h2>Biologi</h2>

</div>
