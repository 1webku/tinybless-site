<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TinyBless Affiliate</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{

background:
linear-gradient(135deg,#4ecdc488,#6dd5ed88),
url("https://images.unsplash.com/photo-1501785888041-af3ef285b470");

background-size:cover;
background-position:center;

min-height:100vh;

display:flex;
justify-content:center;

padding:40px 18px;

}

.container{
max-width:420px;
width:100%;
text-align:center;
}

.logo{
width:70px;
height:70px;
border-radius:50%;
background:white;
padding:10px;
margin:auto;
box-shadow:0 6px 18px rgba(0,0,0,0.25);
}

h1{
margin-top:10px;
font-size:22px;
}

.subtitle{
margin-top:5px;
color:#333;
font-size:14px;
margin-bottom:25px;
}

.card{

background:white;
border-radius:20px;
padding:25px;
margin-bottom:22px;

box-shadow:0 10px 25px rgba(0,0,0,0.15);

}

.product-img{
width:150px;
margin-bottom:12px;
}

.product-title{
font-weight:bold;
font-size:16px;
margin-bottom:6px;
}

.product-desc{
font-size:13px;
color:#555;
margin-bottom:15px;
}

.btn{

display:inline-block;

background:#2f7d5c;
color:white;

padding:12px 28px;

border-radius:28px;

text-decoration:none;

font-weight:bold;

transition:0.2s;

}

.btn:hover{

background:#276a4e;

}

.footer{

margin-top:25px;

font-size:12px;

color:white;

opacity:0.9;

}

</style>

</head>

<body>

<div class="container">

<img src="https://tinybless.my.id/img/logo.png" class="logo">

<h1>TinyBless Affiliate</h1>

<p class="subtitle">
Rekomendasi produk pilihan terbaik
</p>


<div class="card">

<img src="https://via.placeholder.com/150" class="product-img">

<div class="product-title">
Keyboard Mechanical Murah
</div>

<div class="product-desc">
Keyboard nyaman untuk kerja dan gaming.
</div>

<a class="btn" href="#">
Lihat Produk
</a>

</div>



<div class="card">

<img src="https://via.placeholder.com/150" class="product-img">

<div class="product-title">
Laptop Stand Aluminium
</div>

<div class="product-desc">
Stand ergonomis untuk laptop dan tablet.
</div>

<a class="btn" href="#">
Lihat Produk
</a>

</div>



<div class="card">

<img src="https://via.placeholder.com/150" class="product-img">

<div class="product-title">
Mouse Wireless Silent
</div>

<div class="product-desc">
Mouse wireless tanpa suara klik.
</div>

<a class="btn" href="#">
Lihat Produk
</a>

</div>



<div class="footer">
tinybless.my.id
</div>

</div>

</body>
</html>
