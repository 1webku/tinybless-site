<!DOCTYPE html>

<style>

*{

body{

linear-gradient(135deg,#4ecdc488,#6dd5ed88),
url("https://images.unsplash.com/photo-1501785888041-af3ef285b470");

background-size:cover;
background-position:center;

min-height:100vh;

display:flex;
justify-content:center;

padding:40px 18px;

}

.container{
max-width:420px;
width:100%;
text-align:center;
}

.logo-wrap{
width:90px;
height:90px;

margin:auto;
display:flex;
align-items:center;
justify-content:center;

border-radius:20px;
padding:28px 22px;
margin-bottom:24px;

box-shadow:0 10px 25px rgba(0,0,0,0.18);

}

.product-img{
width:200px;
margin-bottom:10px;
}

.product-title{
font-weight:bold;
font-size:17px;
margin-bottom:6px;
}

.product-desc{
font-size:14px;
color:#555;
margin-bottom:18px;
line-height:1.5;
}

.btn{

display:inline-block;

background:#2f7d5c;
color:white;

padding:13px 30px;

border-radius:30px;

text-decoration:none;

font-weight:bold;

font-size:15px;

}

.btn:hover{
background:#256b4d;
}

.footer{

margin-top:30px;

font-size:14px;

}

.footer a{

color:white;
text-decoration:none;
font-weight:bold;

}

</head>
