<!DOCTYPE html>

<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TinyBless Affiliate</title>

<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
}

body{
background:
linear-gradient(135deg,#4ecdc488,#6dd5ed88),
url("https://images.unsplash.com/photo-1501785888041-af3ef285b470");

background-size:cover;
background-position:center;

min-height:100vh;
display:flex;
justify-content:center;

padding:40px 18px;
}

/* CONTAINER */

.container{
width:100%;
max-width:520px;
text-align:center;
}

/* LOGO */

.avatar{
width:90px;
height:90px;
border-radius:50%;
object-fit:contain;
background:white;
padding:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
margin-bottom:14px;
}

h1{
font-size:24px;
margin-bottom:6px;
}

.bio{
font-size:16px;
font-weight:600;
margin-bottom:26px;
}

/* FEATURED PRODUCT */

.featured{
background:white;
border-radius:20px;
overflow:hidden;
margin-bottom:22px;
box-shadow:0 12px 28px rgba(0,0,0,0.2);
}

.featured img{
width:100%;
display:block;
}

.featured-content{
padding:16px;
}

.featured h2{
font-size:20px;
margin-bottom:6px;
}

.featured p{
font-size:14px;
color:#555;
margin-bottom:12px;
}

/* GRID PRODUCTS */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-top:6px;
}

.product{
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.18);
position:relative;
}

.product img{
width:100%;
display:block;
}

.product-content{
padding:10px;
}

.product h3{
font-size:14px;
margin-bottom:6px;
}

/* BADGE */

.badge{
position:absolute;
top:10px;
left:10px;
background:#ff6b6b;
color:white;
font-size:11px;
padding:4px 8px;
border-radius:12px;
font-weight:700;
}

/* BUTTON */

.btn{
display:inline-block;
background:#2b7a78;
color:white;
padding:8px 16px;
border-radius:20px;
text-decoration:none;
font-size:13px;
font-weight:600;
}

/* FOOTER */

.footer{
display:inline-block;
margin-top:30px;
font-size:14px;
font-weight:700;
color:#000;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<img src="../img/logo-tinybless.png" class="avatar">

<h1>TinyBless Affiliate</h1>

<p class="bio">
Rekomendasi produk terbaik pilihan kami
</p>

<!-- FEATURED PRODUCT -->

<div class="featured">

<img src="https://via.placeholder.com/500x300">

<div class="featured-content">

<h2>⭐ Mechanical Keyboard RGB</h2>

<p>
Keyboard terbaik untuk produktivitas dan gaming.
</p>

<a class="btn" href="/go/keyboard">
Lihat Produk
</a>

</div>

</div>

<!-- GRID PRODUCTS -->

<div class="grid">

<div class="product">

<span class="badge">Best Seller</span>

<img src="https://via.placeholder.com/300x200">

<div class="product-content">

<h3>Laptop Stand</h3>

<a class="btn" href="/go/laptopstand">
Beli
</a>

</div>

</div>

<div class="product">

<img src="https://via.placeholder.com/300x200">

<div class="product-content">

<h3>Wireless Mouse</h3>

<a class="btn" href="/go/mouse">
Beli
</a>

</div>

</div>

<div class="product">

<img src="https://via.placeholder.com/300x200">

<div class="product-content">

<h3>Webcam HD</h3>

<a class="btn" href="/go/webcam">
Beli
</a>

</div>

</div>

<div class="product">

<img src="https://via.placeholder.com/300x200">

<div class="product-content">

<h3>USB Hub Type C</h3>

<a class="btn" href="/go/usbhub">
Beli
</a>

</div>

</div>

</div>

<a class="footer" href="https://tinybless.my.id">
tinybless.my.id
</a>

</div>

</body>
</html>
