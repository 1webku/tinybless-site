<!DOCTYPE html>
<html lang="id">
<head>

<title>TinyBless Affiliate</title>

<style>

body{

font-family:Arial, Helvetica, sans-serif;

.container{
max-width:420px;

padding:40px 20px;

padding:12px 25px;

text-decoration:none;

}

.btn:hover{
opacity:0.9;

.section-title{
margin-top:30px;

.footer{
