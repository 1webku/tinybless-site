<!DOCTYPE html>

<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TinyBless Affiliate</title>

<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
}

body{
background:
linear-gradient(135deg,#4ecdc488,#6dd5ed88),
url("https://images.unsplash.com/photo-1501785888041-af3ef285b470");

background-size:cover;
background-position:center;

min-height:100vh;
display:flex;
justify-content:center;
padding:40px 18px;
}

/* CONTAINER */

.container{
width:100%;
max-width:540px;
text-align:center;
}

/* LOGO */

.avatar{
width:90px;
height:90px;
border-radius:50%;
object-fit:contain;
background:white;
padding:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
margin-bottom:14px;
}

/* TITLE */

h1{
font-size:24px;
margin-bottom:6px;
}

.bio{
font-size:16px;
font-weight:600;
margin-bottom:24px;
}

/* FEATURED PRODUCT */

.featured{
background:white;
border-radius:20px;
overflow:hidden;
margin-bottom:22px;
box-shadow:0 10px 28px rgba(0,0,0,0.18);
}

.featured img{
width:100%;
display:block;
}

.featured-content{
padding:16px;
}

.featured h2{
font-size:20px;
margin-bottom:6px;
}

.featured p{
font-size:14px;
color:#555;
margin-bottom:12px;
}

/* BUTTON */

.product-btn{
display:inline-block;
background:#2b7a78;
color:white;
padding:10px 20px;
border-radius:24px;
text-decoration:none;
font-weight:600;
}

/* GRID PRODUK */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

/* CARD */

.card{
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.18);
position:relative;
}

.card img{
width:100%;
height:140px;
object-fit:contain;
padding:14px;
background:#f7f7f7;
}

.card-content{
padding:10px;
}

.card h3{
font-size:15px;
margin-bottom:8px;
}

/* BADGE */

.badge{
position:absolute;
top:10px;
left:10px;
background:#ff4d4d;
color:white;
font-size:11px;
font-weight:700;
padding:4px 8px;
border-radius:12px;
}

/* FOOTER */

.footer{
display:inline-block;
margin-top:30px;
font-size:14px;
font-weight:700;
color:#000;
text-decoration:none;
}

/* MOBILE */

@media (max-width:600px){

.grid{
grid-template-columns:1fr;
}

.card img{
height:180px;
}

}

</style>

</head>

<body>

<div class="container">

<img src="../img/logo-tinybless.png" class="avatar">

<h1>TinyBless Affiliate</h1>

<p class="bio">
Rekomendasi produk pilihan terbaik
</p>

<!-- FEATURED -->

<div class="featured">

<img src="https://cdn-icons-png.flaticon.com/512/2920/2920244.png">

<div class="featured-content">

<h2>⭐ Mechanical Keyboard</h2>

<p>
Keyboard nyaman untuk produktivitas dan gaming.
</p>

<a class="product-btn" href="/go/keyboard" target="_blank">
Lihat Produk
</a>

</div>

</div>

<!-- GRID PRODUK -->

<div class="grid">

<div class="card">

<span class="badge">Best Seller</span>

<img src="https://cdn-icons-png.flaticon.com/512/1048/1048945.png">

<div class="card-content">

<h3>💻 Laptop Stand</h3>

<a class="product-btn" href="/go/laptopstand" target="_blank">
Beli
</a>

</div>

</div>

<div class="card">

<img src="https://cdn-icons-png.flaticon.com/512/1069/1069181.png">

<div class="card-content">

<h3>🖱 Wireless Mouse</h3>

<a class="product-btn" href="/go/mouse" target="_blank">
Beli
</a>

</div>

</div>

<div class="card">

<img src="https://cdn-icons-png.flaticon.com/512/561/561188.png">

<div class="card-content">

<h3>🎧 Headset</h3>

<a class="product-btn" href="/go/headset" target="_blank">
Beli
</a>

</div>

</div>

<div class="card">

<img src="https://cdn-icons-png.flaticon.com/512/2921/2921822.png">

<div class="card-content">

<h3>📷 Webcam</h3>

<a class="product-btn" href="/go/webcam" target="_blank">
Beli
</a>

</div>

</div>

</div>

<a class="footer" href="https://tinybless.my.id">
tinybless.my.id
</a>

</div>

</body>
</html>
