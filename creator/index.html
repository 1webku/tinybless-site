<!DOCTYPE html>

<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TinyBless Creator</title>

<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
}

/* BACKGROUND */

body{

background:
linear-gradient(135deg,#6fd3d866,#3fbac266),
url("https://images.unsplash.com/photo-1501785888041-af3ef285b470");

background-size:cover;
background-position:center;

min-height:100vh;

display:flex;
justify-content:center;

padding:40px 18px;

}

/* CONTAINER */

.container{
width:100%;
max-width:420px;
text-align:center;
}

/* AVATAR */

.avatar{
width:95px;
height:95px;
border-radius:50%;
object-fit:cover;
border:3px solid white;
box-shadow:0 6px 16px rgba(0,0,0,0.25);
margin-bottom:12px;
}

/* TITLE */

h1{
font-size:24px;
color:#000;
margin-bottom:6px;
}

/* SUBTITLE */

.bio{
font-size:18px;
font-weight:700;
color:#000;
margin-bottom:28px;
}

/* BUTTON */

.btn{

position:relative;

background:white;

height:64px;

border-radius:40px;

margin:14px 0;

box-shadow:0 6px 18px rgba(0,0,0,0.18);

text-decoration:none;

display:block;

transition:.25s;

}

.btn:hover{

transform:translateY(-3px);

box-shadow:0 12px 28px rgba(0,0,0,0.25);

}

/* ICON CIRCLE */

.icon{

position:absolute;

left:12px;

top:50%;

transform:translateY(-50%);

width:48px;
height:48px;

border-radius:50%;

background:#f2f2f2;

display:flex;
align-items:center;
justify-content:center;

}

/* ICON SVG */

.icon svg{
width:26px;
height:26px;
}

/* BUTTON TEXT */

.btn span{

position:absolute;

left:50%;
top:50%;

transform:translate(-50%,-50%);

font-size:18px;

font-weight:700;

color:#000;

}

/* SECTION */

.section{

margin-top:32px;

font-size:20px;

font-weight:800;

color:#000;

}

/* FOOTER */

.footer{

display:inline-block;

margin-top:34px;

font-size:18px;

font-weight:800;

color:#000;

text-decoration:none;

padding:6px 14px;

border-radius:10px;

background:rgba(255,255,255,0.6);

}

.footer:hover{
background:white;
}

</style>

</head>

<body>

<div class="container">

<img src="../img/profile.jpg" class="avatar">

<h1>TinyBless Digital Studio</h1>

<p class="bio">
Creator • Tools • Edukasi
</p>

<!-- TIKTOK -->

<a class="btn" href="https://tiktok.com/@tinybless.edu" target="_blank">

<div class="icon">

<svg viewBox="0 0 24 24" fill="black">
<path d="M9 3v12.5a3.5 3.5 0 1 1-2.5-3.35V9.5a6 6 0 1 0 5.5 6V7.5c1.3 1.1 3 1.8 4.5 1.8V6.5c-1.4 0-3-.8-3.8-1.7-.6-.6-.7-1.3-.7-1.8H9z"/>
</svg>

</div>

<span>TikTok</span>

</a>

<!-- WHATSAPP -->

<a class="btn" href="https://wa.me/6283124254787" target="_blank">

<div class="icon">

<svg viewBox="0 0 24 24" fill="black">
<path d="M12 2a10 10 0 0 0-8.7 15l-1.3 4.7 4.8-1.3A10 10 0 1 0 12 2zm5.3 14.2c-.2.6-1.2 1.1-1.7 1.2-.4.1-.9.1-1.4 0-.3-.1-.7-.2-1.2-.4-2.1-.9-3.5-3.1-3.6-3.3-.1-.2-.8-1.1-.8-2.1s.5-1.5.7-1.7c.2-.2.5-.3.7-.3h.5c.2 0 .4 0 .6.5s.7 1.6.7 1.7c.1.1.1.3 0 .5s-.2.3-.3.5c-.2.2-.4.4-.6.6-.2.2-.4.3-.2.7.2.3.8 1.3 1.7 2 .8.7 1.4.9 1.7 1 .3.1.5.1.7-.1.2-.2.7-.8.9-1 .2-.2.4-.2.7-.1.3.1 1.7.8 2 .9.3.2.5.2.5.3 0 .1 0 .6-.2 1.2z"/>
</svg>

</div>

<span>WhatsApp</span>

</a>

<!-- JASA BIO LINK -->

<a class="btn" href="/jasa-bio-link/" target="_blank">

<div class="icon">🔗</div>

<span>Jasa Bio Link</span>

</a>

<div class="section">
TinyBless Content
</div>

<!-- TOOLS -->

<a class="btn" href="/tools/" target="_blank">

<div class="icon">🛠</div>

<span>Tools Creator</span>

</a>

<!-- TIPS -->

<a class="btn" href="/tips/" target="_blank">

<div class="icon">💡</div>

<span>Tips Digital</span>

</a>

<!-- IPA -->

<span>Infografis IPA</span>

</a>

tinybless.my.id
</a>

</div>

</body>
</html>
