<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TinyBless Creator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{

background:
linear-gradient(rgba(255,255,255,0.6),rgba(255,255,255,0.6)),
url("https://images.unsplash.com/photo-1557683316-973673baf926");

background-size:cover;
background-position:center;

min-height:100vh;

padding:30px 15px;

}

/* CONTAINER */

.container{

max-width:420px;
margin:auto;

text-align:center;

}

/* AVATAR */

.avatar{

width:110px;
height:110px;

border-radius:50%;

object-fit:cover;

border:4px solid white;

box-shadow:0 8px 20px rgba(0,0,0,0.25);

margin-bottom:15px;

}

/* TITLE */

h1{

font-size:24px;
color:black;
margin-bottom:5px;

}

.bio{

color:#333;
margin-bottom:25px;

}

/* BUTTON */

.btn{

display:flex;
align-items:center;

background:white;

height:64px;

border-radius:40px;

padding:0 18px;

margin:12px 0;

text-decoration:none;

box-shadow:0 5px 15px rgba(0,0,0,0.15);

}

/* IMAGE LEFT */

.btn img{

width:42px;
height:42px;

border-radius:50%;

object-fit:cover;

margin-right:15px;

}

/* TEXT */

.btn span{

flex:1;

text-align:center;

font-weight:600;

color:black;

font-size:16px;

}

.section{

margin-top:25px;

color:#444;

font-size:13px;

}

.footer{

margin-top:30px;

color:#444;

font-size:13px;

}

</style>

</head>

<body>

<div class="container">

<img src="../img/profile.png" class="avatar">

<h1>TinyBless Digital Studio</h1>

<p class="bio">
Creator • Tools • Edukasi
</p>

<a class="btn" href="https://tiktok.com/@tinybless.edu">
<img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
<span>TikTok</span>
</a>

<a class="btn" href="https://wa.me/6283124254787">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
<span>WhatsApp</span>
</a>

<a class="btn" href="/jasa-bio-link/">
<img src="https://cdn-icons-png.flaticon.com/512/1828/1828919.png">
<span>Jasa Bio Link</span>
</a>

<div class="section">
TinyBless Content
</div>

<a class="btn" href="/tools/">
<img src="https://cdn-icons-png.flaticon.com/512/2103/2103633.png">
<span>Tools Creator</span>
</a>

<a class="btn" href="/tips/">
<img src="https://cdn-icons-png.flaticon.com/512/1828/1828919.png">
<span>Tips Digital</span>
</a>

<a class="btn" href="/edukasi/ipa/">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png">
<span>Infografis IPA</span>
</a>

<div class="footer">
tinybless.my.id
</div>

</div>

</body>
</html>
