<!DOCTYPE html>

<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TinyBless Creator</title>

<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
}

body{

background:
linear-gradient(135deg,#6fd3d866,#3fbac266),
url("https://images.unsplash.com/photo-1501785888041-af3ef285b470");

background-size:cover;
background-position:center;

min-height:100vh;

display:flex;
justify-content:center;

padding:40px 18px;

}

.container{
width:100%;
max-width:420px;
text-align:center;
}

/* avatar */

.avatar{
width:95px;
height:95px;
border-radius:50%;
object-fit:cover;
border:3px solid white;
box-shadow:0 6px 16px rgba(0,0,0,0.25);
margin-bottom:12px;
}

h1{
font-size:24px;
color:#000;
margin-bottom:6px;
}

.bio{
font-size:18px;
font-weight:700;
color:#000;
margin-bottom:28px;
}

/* BUTTON */

.btn{

display:flex;
align-items:center;

background:white;

height:66px;

border-radius:40px;

margin:14px 0;

box-shadow:0 6px 18px rgba(0,0,0,0.18);

text-decoration:none;

padding-left:12px;

transition:.25s;

}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 12px 28px rgba(0,0,0,0.25);
}

/* ICON */

.icon{

width:50px;
height:50px;

border-radius:50%;

background:#eeeeee;

display:flex;
align-items:center;
justify-content:center;

flex-shrink:0;

}

.icon img{
width:26px;
height:26px;
}

/* TEXT CENTER */

.btn span{

flex:1;

text-align:center;

font-size:18px;
font-weight:700;
color:#000;

}

/* SECTION */

.section{
margin-top:32px;
font-size:20px;
font-weight:800;
color:#000;
}

/* FOOTER */

.footer{
display:inline-block;
margin-top:34px;
font-size:18px;
font-weight:800;
color:#000;
text-decoration:none;
padding:6px 14px;
border-radius:10px;
background:rgba(255,255,255,0.6);
}

.footer:hover{
background:white;
}

</style>

</head>

<body>

<div class="container">

<img src="../img/profile.jpg" class="avatar">

<h1>TinyBless Digital Studio</h1>

<p class="bio">
Creator • Tools • Edukasi
</p>

<!-- TikTok -->

<a class="btn" href="https://tiktok.com/@tinybless.edu" target="_blank">

<div class="icon">
<img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
</div>

<span>TikTok</span>

</a>

<!-- WhatsApp -->

<a class="btn" href="https://wa.me/6283124254787" target="_blank">

<div class="icon">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</div>

<span>WhatsApp</span>

</a>

<!-- BIO LINK -->

<a class="btn" href="/jasa-bio-link/" target="_blank">

<div class="icon">
<img src="https://cdn-icons-png.flaticon.com/512/1006/1006771.png">
</div>

<span>Jasa Bio Link</span>

</a>

<div class="section">
TinyBless Content
</div>

<!-- TOOLS -->

<a class="btn" href="/tools/" target="_blank">

<div class="icon">
<img src="https://cdn-icons-png.flaticon.com/512/2103/2103633.png">
</div>

<span>Tools Creator</span>

</a>

<!-- TIPS -->

<a class="btn" href="/tips/" target="_blank">

<div class="icon">
<img src="https://cdn-icons-png.flaticon.com/512/709/709496.png">
</div>

<span>Tips Digital</span>

</a>

<!-- EDUKASI -->

<a class="btn" href="/edukasi/ipa/" target="_blank">

<div class="icon">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png">
</div>

<span>Infografis IPA</span>

</a>

<a class="footer" href="https://tinybless.my.id">
tinybless.my.id
</a>

</div>

</body>
</html>
