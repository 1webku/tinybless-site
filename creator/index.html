<!DOCTYPE html>

<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TinyBless Creator</title>

<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
}

/* BACKGROUND */

body{

background:
linear-gradient(135deg,#6fd3d866,#3fbac266),
url("https://images.unsplash.com/photo-1501785888041-af3ef285b470");

background-size:cover;
background-position:center;

min-height:100vh;

display:flex;
justify-content:center;

padding:40px 18px;

}

/* CONTAINER */

.container{

width:100%;
max-width:420px;
text-align:center;

}

/* AVATAR */

.avatar{

width:90px;
height:90px;

border-radius:50%;

object-fit:cover;
object-position:top center;

border:3px solid white;

box-shadow:0 6px 16px rgba(0,0,0,0.25);

margin-bottom:12px;

}

/* TITLE */

h1{

font-size:24px;
color:#000;
margin-bottom:6px;

}

/* SUBTITLE */

.bio{

font-size:18px;
font-weight:700;
color:#000;

margin-bottom:28px;

}

/* BUTTON */

.btn{

position:relative;

background:white;

height:62px;

border-radius:40px;

margin:14px 0;

box-shadow:0 6px 16px rgba(0,0,0,0.15);

text-decoration:none;

display:block;

transition:.25s;

}

.btn:hover{

transform:translateY(-3px);

box-shadow:0 12px 26px rgba(0,0,0,0.25);

}

/* ICON CIRCLE */

.icon{

position:absolute;

left:12px;

top:50%;

transform:translateY(-50%);

width:40px;
height:40px;

border-radius:50%;

background:#f4f4f4;

display:flex;
align-items:center;
justify-content:center;

}

/* BUTTON TEXT */

.btn span{

position:absolute;

left:50%;
top:50%;

transform:translate(-50%,-50%);

font-size:17px;

font-weight:700;

color:#000;

}

/* SECTION TITLE */

.section{

margin-top:32px;

font-size:20px;

font-weight:800;

color:#000;

}

/* FOOTER */

.footer{

display:inline-block;

margin-top:34px;

font-size:18px;

font-weight:800;

color:#000;

text-decoration:none;

padding:6px 14px;

border-radius:10px;

background:rgba(255,255,255,0.6);

}

.footer:hover{

background:white;

}

</style>

</head>

<body>

<div class="container">

<img src="../img/profile.jpg" class="avatar">

<h1>TinyBless Digital Studio</h1>

<p class="bio">
Creator • Tools • Edukasi
</p>

<!-- SOCIAL -->

<a class="btn" href="https://tiktok.com/@tinybless.edu" target="_blank">

<div class="icon">🎵</div>

<span>TikTok</span>

</a>

<a class="btn" href="https://wa.me/6283124254787" target="_blank">

<div class="icon">💬</div>

<span>WhatsApp</span>

</a>

<a class="btn" href="/jasa-bio-link/" target="_blank">

<div class="icon">🔗</div>

<span>Jasa Bio Link</span>

</a>

<!-- CONTENT -->

<div class="section">
TinyBless Content
</div>

<a class="btn" href="/tools/" target="_blank">

<div class="icon">🛠</div>

<span>Tools Creator</span>

</a>

<a class="btn" href="/tips/" target="_blank">

<div class="icon">💡</div>

<span>Tips Digital</span>

</a>

<a class="btn" href="/edukasi/ipa/" target="_blank">

<div class="icon">🎓</div>

<span>Infografis IPA</span>

</a>

<a class="footer" href="https://tinybless.my.id">
tinybless.my.id
</a>

</div>

</body>
</html>
