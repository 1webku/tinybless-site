<title>TinyBless Creator Bio Link</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:url("/img/profile.png") center/cover no-repeat fixed;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* layer gelap agar teks terlihat */
body::after{
content:"";

inset:0;
background:rgba(0,0,0,0.65);
z-index:0;
}

.container{
max-width:420px;
width:90%;
text-align:center;

/* avatar */
.avatar{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
object-position:top;
border:4px solid white;
box-shadow:0 10px 30px rgba(0,0,0,0.7);
margin-bottom:15px;
}

/* text */
h1{
font-size:26px;
margin-bottom:6px;
}

.bio{
opacity:.9;
margin-bottom:25px;
}

/* buttons */
.link{
display:block;
margin:12px 0;
padding:15px;
background:white;
color:#111;
text-decoration:none;
border-radius:30px;
font-weight:bold;
transition:.25s;
}

.link:hover{
transform:scale(1.05);
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.section{
margin-top:25px;
font-size:13px;
opacity:.85;
}

.footer{
margin-top:30px;
font-size:13px;
opacity:.75;
}

</style>
</head>
