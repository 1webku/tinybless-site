<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TinyBless Creator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

/* BACKGROUND AQUA + GAMBAR */

body{

background:
linear-gradient(rgba(0,200,210,0.45),rgba(0,200,210,0.45)),
url("https://images.unsplash.com/photo-1501785888041-af3ef285b470");

background-size:cover;
background-position:center;

min-height:100vh;

padding:35px 16px;

}

/* CONTAINER */

.container{

max-width:420px;
margin:auto;
text-align:center;

}

/* FOTO PROFIL */

.avatar{

width:110px;
height:110px;

border-radius:50%;

object-fit:cover;

border:4px solid white;

box-shadow:0 6px 20px rgba(0,0,0,0.25);

margin-bottom:12px;

}

/* JUDUL */

h1{

font-size:26px;

color:black;

margin-bottom:6px;

}

/* SUBTITLE */

.bio{

color:black;

font-size:18px;

font-weight:600;

margin-bottom:26px;

}

/* TOMBOL */

.btn{

position:relative;

background:white;

height:64px;

border-radius:40px;

margin:12px 0;

box-shadow:0 5px 15px rgba(0,0,0,0.15);

text-decoration:none;

display:block;

}

/* ICON KIRI */

.icon{

width:46px;
height:46px;

border-radius:50%;

position:absolute;

left:10px;

top:50%;

transform:translateY(-50%);

object-fit:cover;

}

/* TEKS TOMBOL TENGAH */

.btn span{

position:absolute;

left:50%;

top:50%;

transform:translate(-50%,-50%);

font-size:17px;

font-weight:700;

color:black;

}

/* SECTION TITLE */

.section{

margin-top:30px;

font-size:18px;

font-weight:700;

color:black;

}

/* FOOTER */

.footer{

margin-top:32px;

font-size:18px;

font-weight:700;

color:black;

}

</style>

</head>

<body>

<div class="container">

<img src="../img/profile.png" class="avatar">

<h1>TinyBless Digital Studio</h1>

<p class="bio">
Creator • Tools • Edukasi
</p>

<a class="btn" href="https://tiktok.com/@tinybless.edu">
<img class="icon" src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
<span>TikTok</span>
</a>

<a class="btn" href="https://wa.me/6283124254787">
<img class="icon" src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
<span>WhatsApp</span>
</a>

<a class="btn" href="/jasa-bio-link/">
<img class="icon" src="https://cdn-icons-png.flaticon.com/512/1828/1828919.png">
<span>Jasa Bio Link</span>
</a>

<div class="section">
TinyBless Content
</div>

<a class="btn" href="/tools/">
<img class="icon" src="https://cdn-icons-png.flaticon.com/512/2103/2103633.png">
<span>Tools Creator</span>
</a>

<a class="btn" href="/tips/">
<img class="icon" src="https://cdn-icons-png.flaticon.com/512/1828/1828919.png">
<span>Tips Digital</span>
</a>

<a class="btn" href="/edukasi/ipa/">
<img class="icon" src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png">
<span>Infografis IPA</span>
</a>

<div class="footer">
tinybless.my.id
</div>

</div>

</body>
</html>
