Faktanya, yang terjadi justru sebaliknya!!<br><br>

1. Para Dewa dan Dharmapala melindungi:<br>
Di dalam sutra disebutkan secara jelas bahwa di tempat mana pun Ksitigarbha Sutra dilafalkan, Dewa Bumi (Prthivi) serta para pelindung dharma dari Delapan Kelompok Makhluk Surga akan datang untuk menjaga.<br><br>

Hal ini ibarat Anda mengundang tamu yang sangat terhormat ke rumah; secara alami akan ada pengawal yang mengikuti untuk berjaga, sehingga kekuatan jahat justru tidak berani mendekat.<br><br>

2. Mengikis Karma dan Menambah Berkah:<br>
Melafalkan sutra adalah sedang mengubah medan energi di dalam rumah.<br>
Saat Anda melafalkannya dengan sepenuh hati, muncul energi cahaya yang positif, damai, dan terang.<br><br>

Jika memang ada makhluk "tak kasat mata" yang datang, mereka sebenarnya tertarik oleh kekuatan sutra untuk ikut mendengarkan Dharma dan mencari pembebasan.<br><br>

3. Berdamai dengan Penagih Hutang Karma:<br>
Makhluk "tak kasat mata" tersebut bisa jadi adalah mereka yang memiliki jalinan karma dengan Anda dari kehidupan sebelumnya.<br><br>

Mereka datang dengan harapan memperoleh manfaat dari kebajikan Anda untuk terbebas dari penderitaan.<br><br>

Ketika mereka telah menerima manfaat Dharma dan pergi, rintangan dalam hidup Anda justru akan berkurang.<br><br>

Ini adalah siklus positif: yang tidak terseberangkan menjadi terbebaskan, dan yang hidup menjadi damai.`,
makna:`Pesan ini meluruskan kesalahpahaman bahwa melafalkan sutra akan membawa gangguan. Justru sebaliknya, praktik Dharma menghadirkan perlindungan, membersihkan karma, dan menciptakan keharmonisan antara dunia terlihat dan tak terlihat.`
},

  content:`Tidak ada Dharmapala (Dewa Pelindung) di sisimu adalah hal yang sangat berbahaya!<br><br>

Sangat mudah, buatlah persembahan (puja) kepada Dharmapala!<br><br>

Kamu harus sering-sering mengingat/mengenang Dharmapala-mu!<br><br>

• Kamu harus membuat persembahan kepada Dharmapala setiap hari!<br><br>

• Terutama pada hari ulang tahun Dharmapala, kamu harus lebih lagi membuat persembahan!<br><br>

• Kita bahkan harus membuat persembahan kepada Dharmapala setiap kali makan tiga kali sehari!<br><br>

• Saat makan camilan maupun minum segelas air pun, juga harus membuat persembahan kepada Dharmapala!<br><br>

• Kamu mempersembahkan kepada Guru Silsilah Utama, kepada Yidam, dan kepada Dharmapala secara bersama-sama.<br><br>

• Ini adalah hal yang harus dilakukan setiap hari.`,

  makna:`Menghormati dan selalu mengingat Dharmapala melambangkan rasa syukur, penghormatan, dan hubungan batin yang terus dijaga antara praktisi dengan pelindung spiritualnya.`
},  

{
  img:"img/wejangan46.jpg",
  title:"Guru, Yidam, dan Dharmapala Menyatu",

  content:`Guru, Yidam, dan Dharmapala, tiga menyatu menjadi satu, bersemayam di atas mahkota kepala!<br><br>

Jika kamu mampu membuat Guru, Yidam, dan Dharmapala menyatu menjadi satu secara bersama-sama.<br><br>

• Caranya sangat mudah, Saya beri tahu anda :<br><br>

• Yidam-mu terlebih dahulu bersemayam di atas mahkota kepalamu.<br><br>

• Lalu Guru Silsilah Utama memasuki tubuh Yidam, dan Dharmapala juga memasuki tubuh Yidam.<br><br>

• Nah, dengan begitu kamu memiliki Guru, memiliki Yidam, sekaligus memiliki Dharmapala!<br><br>

• Mereka semua berjalan bersamamu! Bukankah itu sangat baik?`,

  makna:`Praktisi diajak untuk senantiasa menyatukan batin dengan Guru, Yidam, dan Dharmapala agar memperoleh perlindungan, bimbingan, dan kekuatan spiritual dalam kehidupan sehari-hari maupun dalam praktik Dharma.`
},

{
  img:"img/wejangan47.jpg",
  title:"Membangkitkan Bodhicitta",

  content:`Harus membangkitkan "Bodhicitta" (Hati Bodhi)!<br><br>

Karena "Bodhicitta" adalah inti (pusat) dari Buddhadharma!<br><br>

Mahadewi Yaochi, Amitabha Tathagata, Bodhisattva Ksitigarbha,<br>
Mereka semua telah membangkitkan "Bodhicitta"!<br><br>

Semoga Anda semua,<br>
Setiap orang,<br>
Membangkitkan "Bodhicitta"!`,

  makna:`Tolok ukur kesuksesan spiritual yang sejati terletak pada seberapa besar kasih dan kepedulian kita terhadap keselamatan makhluk lain. Membangkitkan Bodhicitta adalah langkah awal dan akhir untuk menyatu dengan hati para Buddha.`
},

{
  img:"img/wejangan48.jpg",
  title:"Vegetarian Sejati",

  content:`Maksud/Tujuan Sejati dari Buddha Sakyamuni adalah :<br><br>

"Tidak Tamak Itulah Vegetarian Sejati".<br><br>

Vegetarian bukan hanya sekadar di mulut saja,<br>
Melainkan pada mata, telinga, hidung, lidah, tubuh, dan pikiran.<br>
(Enam Indra harus bersih).<br><br>

Lagi :<br><br>

Ada orang yang mengira, asal mulutnya sudah bervegetarian,<br>
Maka dirinya sudah sangat hebat,<br>
Merasa lebih tinggi satu tingkat daripada orang yang makan daging/makanan hewani.<br><br>

Perasaan "lebih tinggi satu tingkat" ini adalah bentuk kesombongan dan keakuan,<br>
Membuat diri menjadi angkuh.<br><br>

Dan rasa "angkuh/sombong" ini,<br>
Seketika berubah menjadi kekotoran/non-vegetarian.<br><br>

Ada orang yang mulutnya bervegetarian,<br>
Tetapi melakukan penipuan harta dan pelecehan/penipuan seksual,<br>
Ini adalah kekotoran.<br><br>

Ada orang yang mulutnya bervegetarian,<br>
Tetapi berucap kasar dan memaki orang lain,<br>
Ini adalah kekotoran/non-vegetarian.<br><br>

Ada orang yang mulutnya bervegetarian,<br>
Tetapi mencuri, merampok, dan menipu,<br>
Ini adalah kekotoran/non-vegetarian.<br><br>

Mantra, Mudra, dan "Visualisasi" dalam Tantrayana,<br>
Mampu mengubah yang kotor menjadi suci murni.`,

  makna:`Vegetarian sejati bukan hanya soal makanan, melainkan pemurnian seluruh perilaku, ucapan, pikiran, dan enam indra agar terbebas dari keserakahan, kesombongan, dan kekotoran batin.`
},

{
  img:"img/wejangan49.jpg",
  title:"Kehidupan dan Uang",

  content:`Saya selalu merasa :<br><br>

Kehidupan itu sangat singkat.<br>
(Hanya satu kehidupan ini saja).<br><br>

Ketika kehidupan sudah tidak ada,<br>
Uang pun ikut lenyap bersamanya.<br><br>

Nyawa hanya satu.<br>
Sebanyak apa pun uangmu,<br>
Ia tetap tidak akan mampu menyelamatkanmu.<br><br>

Karena organ tubuh manusia tidak mudah dicari,<br>
Dan tidak mudah dicocokkan.<br><br>

Saya tetap menganggap bahwa "Tao" (Jalan Spiritual)<br>
Adalah yang paling penting,<br>
Paling bernilai,<br>
Dan paling berharga.<br><br>

"Tao" dapat membuatmu mendapatkan :<br><br>

• Kebahagiaan Agung.<br>
• Kecemerlangan/Cahaya Suci.<br>
• Kehadiran Sunyata/Kekosongan Sejati.<br>
• Tidak perlu lagi masuk ke dalam roda samsara/reinkarnasi.<br>
• Tidak akan pernah mundur lagi dari tingkat kesucian.<br>
• Kamu akan mencapai alam/tingkatan tertinggi yang tiada taranya.<br><br>

Pada saat itu,<br>
Kehidupan (duniawi), harta benda, kisah cinta, reputasi/nama baik, dan jabatan,<br>
Semuanya hanyalah sampah.`,

  makna:`Agar manusia tidak mengorbankan waktu hidupnya yang singkat hanya untuk mengejar materi duniawi, melainkan mengalokasikan waktu berharga tersebut untuk melatih batin demi memperoleh kebebasan spiritual yang sejati dan abadi.`
},

{
  img:"img/wejangan50.jpg",
  title:"Berkah Besar yang Sejati",

  content:`Hati yang suci murni (bersih),<br>
Barulah merupakan berkah/rezeki besar yang sejati.<br><br>

Berkah besar bukan berarti menduduki jabatan tinggi,<br>
Juga bukan berarti menghasilkan banyak uang,<br>
Menjadi kaya raya dan terhormat.<br><br>

Melainkan hati yang suci murni,<br>
Itulah berkah besar yang sejati.<br><br>

Nama Vajra saya adalah "Vajra Maha Berkah",<br>
Yang dimaksud di dalamnya adalah memutuskan kekhawatiran/kerisauan batin (klesha),<br>
Dan memiliki hati yang suci murni!`,

  makna:`Fokuslah memurnikan hati (batin). Karena saat hati telah bersih dan bebas dari kerisauan, Anda telah memiliki kekayaan dan berkah terbesar yang paling abadi.`
},

{
  title:"",
  img:"img/wejangan51.jpg",

  content:`Di Alam Surga Pun Tetap Ber-Reinkarnasi<br><br>

• Di alam surga pun pasti harus (tetap) ber-reinkarnasi!<br><br>

• Karena adanya kekuatan karma, seseorang harus membersihkan dan mengakhiri karma-karma yang telah diperbuatnya sendiri, inilah yang disebut dengan kultivasi/melatih diri.<br><br>

• Tidak hanya harus berbuat kebajikan saja, tetapi juga harus melatih diri hingga memancarkan cahaya murni diri sendiri.<br><br>

• Menggunakan cahaya diri sendiri untuk menyatu, meleburkan diri dengan seluruh alam semesta.<br><br>

• Kamu mencapai tingkatan "Tidak Akan Mundur Lagi"; tiga buah pencapaian ini... Arahat dan Pratyekabuddha berada dalam kelompok yang sama, kemudian Bodhisattva, dan Buddha, merekalah yang selamanya tidak akan mundur lagi (Yong Pu Tui Zhuan).<br><br>

• Pada saat itulah baru dianggap benar-benar keluar dari enam alam reinkarnasi (samsara), dan barulah dianggap sebagai Keberhasilan Agung (Pencerahan).`,

  makna:`Karena adanya hukum karma, seseorang harus membersihkan karma-karma yang telah diperbuatnya sendiri melalui latihan spiritual. Tidak cukup hanya berbuat kebajikan, tetapi juga harus memurnikan diri hingga mencapai keadaan batin yang mantap, tidak mundur lagi, dan akhirnya terbebas dari lingkaran samsara (reinkarnasi).`
},

{

title:"Di Tengah Sakit, Raih Pembebasan Melalui Melatih Diri/Bhavana",
content:`• Sakit adalah cara mengikis rintangan karma; itu adalah karma diri sendiri.<br><br>

makna:`Penyakit bukanlah penghalang untuk melatih diri. Dengan cara pandang yang benar, rasa sakit pada tubuh justru dapat dijadikan tungku perapian yang membakar habis kekotoran karma dan mempercepat kematangan spiritual kita.`

/* ===== RENDER ===== */
let index = 0;

const params = new URLSearchParams(window.location.search);

const startIndex = parseInt(params.get("i")) - 1 || 0;

if(startIndex >= 0 && startIndex < wejanganData.length){
  index = startIndex;
}
  
const container = document.getElementById("container");
const total = wejanganData.length;

wejanganData.forEach((item,i)=>{
  const slide = document.createElement("div");
  slide.className="slide";

  slide.innerHTML = `
    <div class="card">
      <img src="${item.img}" class="img">

      <button class="btn" onclick="toggleText(${i})">🌐 Lihat Terjemahan</button>
      <button class="btn" onclick="shareWA(${i})">📤 Share ke WhatsApp</button>

      <div id="text${i}" class="hidden">
        <h3>${item.title}</h3>
        <p>${item.content}</p>
        <div class="makna">${item.makna}</div>
      </div>
      <div class="hint-bottom">← Geser lihat artikel lain →</div>
    </div>
  `;

  container.appendChild(slide);
});

setTimeout(()=>{
  container.scrollTo({
    left: index * window.innerWidth
  });
  updateDots();
}, 100);  
  
function toggleText(i){
  document.getElementById("text"+i).classList.toggle("show");
}

function nextSlide(){
  if(index < total-1){
    index++;
    container.scrollTo({left:index * window.innerWidth});
  }
}

function prevSlide(){
  if(index > 0){
    index--;
    container.scrollTo({left:index * window.innerWidth});
  } else {
    location.href="index.html";
  }
}

function goHome(){
  location.href="index.html";
}

function toggleDark(){
  document.body.classList.toggle("dark");
}

/* ===== SHARE (KEMBALIKAN KE MODEL YANG BISA TEKS + PREVIEW) ===== */
async function shareWA(i){

  try {

    // ambil gambar sesuai nomor wejangan
    const imageUrl =
      "img/wejangan" + (i + 1) + ".jpg";

    // download gambar
    const response = await fetch(imageUrl);
    const blob = await response.blob();

    // ubah menjadi file
    const file = new File(
      [blob],
      "wejangan" + (i + 1) + ".jpg",
      {
        type: blob.type
      }
    );

    // caption pendek
    const text =
      "👇 Baca terjemahan di sini\n\n" +
      "https://tinybless.my.id/client/vihara-vidya-dharma/wejangan.html?i=" +
      (i + 1);

    // share gambar + caption
    if (
      navigator.canShare &&
      navigator.canShare({ files:[file] })
    ) {

      await navigator.share({
        title:"Wejangan Harian",
        text:text,
        files:[file]
      });

    } else {

      // fallback kalau browser tidak support
      window.open(
        "https://wa.me/?text=" +
        encodeURIComponent(text),
        "_blank"
      );
    }

  } catch(err) {
    console.log(err);
  }

}
  
</script>
