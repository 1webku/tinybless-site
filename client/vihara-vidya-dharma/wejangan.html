/* ===== RENDER ===== */
let index = 0;
const container = document.getElementById("container");
const total = wejanganData.length;

wejanganData.forEach((item,i)=>{
  const slide = document.createElement("div");
  slide.className="slide";

  slide.innerHTML = `
    <div class="card">
      <img src="${item.img}" class="img">

      <button class="btn" onclick="toggleText(${i})">🌐 Lihat Terjemahan</button>
      <button class="btn" onclick="shareWA(${i})">📤 Share ke WhatsApp</button>

      <div id="text${i}" class="hidden">
        <h3>${item.title}</h3>
        <p>${item.content}</p>
        <div class="makna">${item.makna}</div>
      </div>
    </div>
  `;

  container.appendChild(slide);
});

function toggleText(i){
  document.getElementById("text"+i).classList.toggle("show");
}

function nextSlide(){
  if(index < total-1){
    index++;
    container.scrollTo({left:index * window.innerWidth});
  }
}

function prevSlide(){
  if(index > 0){
    index--;
    container.scrollTo({left:index * window.innerWidth});
  } else {
    location.href="index.html";
  }
}

function goHome(){
  location.href="index.html";
}

function toggleDark(){
  document.body.classList.toggle("dark");
}

/* ===== SHARE (KEMBALIKAN KE MODEL YANG BISA TEKS + PREVIEW) ===== */
function shareWA(i){
  const item = wejanganData[i];

  const url = "https://tinybless.my.id/client/vihara-vidya-dharma/wejangan.html";

  const text =
    "Wejangan Harian 🌿\n\n" +
    item.title + "\n\n" +
    "Baca lengkap:\n" + url;

  // langsung ke WhatsApp (HP & PC)
  const link = "https://api.whatsapp.com/send?text=" + encodeURIComponent(text);
  window.open(link, "_blank");
}

</script>
