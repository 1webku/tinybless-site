<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wejangan Harian</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fdf6f0;
}

/* SWIPE */
.container {
  display: flex;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  height: 100vh;
  scroll-behavior: smooth;
}

.slide {
  min-width: 100%;
  scroll-snap-align: start;
  padding: 16px;
  box-sizing: border-box;
}

/* CARD */
.card {
  background: white;
  border-radius: 20px;
  padding: 16px;
  max-width: 420px;
  margin: auto;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.img {
  width: 100%;
  border-radius: 15px;
}

/* BUTTON */
.btn {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 999px;
  border: none;
  background: linear-gradient(135deg,#4fd1c5,#63b3ed);
  color: white;
  font-weight: bold;
}

.hidden { display: none; }
.show { display: block; }

p { font-size: 16px; line-height: 1.7; }

.makna {
  background: #eef7f6;
  padding: 12px;
  border-radius: 12px;
  margin-top: 10px;
}

/* NAV */
.nav-btn {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.5);
  color: white;
  border: none;
  font-size: 20px;
  padding: 10px;
  border-radius: 50%;
}

.prev { left: 10px; }
.next { right: 10px; }

/* DOT */
.dots {
  position: fixed;
  bottom: 15px;
  width: 100%;
  text-align: center;
}

.dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  margin: 4px;
  background: #ccc;
  border-radius: 50%;
}

.active { background: #4fd1c5; }

/* HINT */
.hint {
  position: fixed;
  bottom: 40px;
  width: 100%;
  text-align: center;
  font-size: 12px;
}

/* 🌙 DARK MODE */
body.dark {
  background: #0f172a;
  color: #e2e8f0;
}

body.dark .card {
  background: #1e293b;
  color: #e2e8f0;
}

body.dark .makna {
  background: #1f2937;
  color: #e2e8f0;
}

body.dark .btn {
  background: linear-gradient(135deg,#0ea5e9,#6366f1);
}  

.top-bar{
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  width: 320px; /* biar tidak full */
  display: flex;
  justify-content: space-between;
  z-index: 100;
}

.top-btn{
  background: linear-gradient(135deg,#4fd1c5,#63b3ed);
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 999px;
  font-size: 13px;
}
  
</style>

</head>

<body>

<div class="top-bar">
  <button onclick="goHome()" class="top-btn">🏠 Home</button>
  <button onclick="toggleDark()" class="top-btn">🌙 Mode</button>
</div>

<button class="nav-btn prev" onclick="prevSlide()">‹</button>
<button class="nav-btn next" onclick="nextSlide()">›</button>
  
<div id="container" class="container"></div>
<div class="dots" id="dots"></div>
<div class="hint">← Geser atau gunakan tombol →</div>

<script>
const wejanganData = [

{
img:"img/wejangan1.jpg",
title:"Kematian Tidak Perlu Dipersiapkan",
content:`Sama sekali tidak perlu dipersiapkan, jika waktunya meninggal ya meninggal saja, mempersiapkan apa?<br><br>
Apa yang perlu dipersiapkan, karena ini adalah Ketidakkekalan (Anitya)!<br><br>
Mempersiapkannya pun sudah terlambat!...<br><br>
Pelafalan nama Buddha, penjapaan mantra, dan pembacaan sutra dalam keseharianmu, itulah persiapannya.<br><br>
Melatih Dharma dalam keseharianmu itulah persiapannya, melakukan kebajikan dalam keseharianmu itulah persiapannya.<br><br>
Apa lagi yang perlu kau persiapkan?`,
makna:`Wejangan ini bukan berarti kita harus mengabaikan kematian. Sebaliknya, maknanya adalah bahwa 'persiapan' sejati bukanlah sesuatu yang dilakukan mendadak saat ajalnya tiba, melainkan hasil dari akumulasi latihan spiritual dan perbuatan baik yang dilakukan secara konsisten setiap hari selama hidup. Karena kematian bisa datang kapan saja (ketidakkekalan), maka setiap momen kehidupan yang dijalani dengan sadar dan baik adalah bentuk persiapan yang sesungguhnya.`
},

{
img:"img/wejangan2.jpg",
title:"Hakikat Kehidupan",
content:`Jika suatu hari nanti ada seseorang yang bertanya:<br>
"Lu Sheng-yen telah pergi, apa yang dia tinggalkan?"<br>
Para siswa dapat menjawab demikian:<br>
"Dia meninggalkan setumpuk buku, yang di dalamnya terdapat Hakikat Kehidupan."`,
makna:`Seorang guru sejati tetap hidup melalui ajarannya. Bagi para murid, cara terbaik untuk menghormati guru dan mempersiapkan diri adalah dengan mempelajari dan mempraktikkan ajaran (Dharma) tersebut secara konsisten.`
},

{
img:"img/wejangan3.jpg",
title:"Kesadaran dalam Seteguk Air",
content:`Buddha Sakyamuni pernah bersabda:<br><br>
"Dalam seteguk air bersih, terdapat 84.000 makhluk kecil (mikroorganisme). jika tidak melafalkan mantra, maka itu sama saja dengan membunuh makhluk hidup."<br><br>
Oleh karena itu, Mula Guru Lian Sheng mengajarkan kepada para siswa bahwa dalam kehidupan sehari-hari harus membentuk Mudra Penyeberangan Samudra (Ta Hai Chao Tu Shou Yin) dan melafalkan Mantra Kelahiran Kembali Manjusri:<br>
"Om. Ah-pe-la-hum. Kan-cha-la. So-ha."<br><br>
Memberi manfaat bagi makhluk hidup, jasa yang tak terhingga, kasih sayang yang tanpa batas.`,
makna:`mengajarkan kita untuk memiliki kesadaran penuh bahwa tindakan sederhana seperti minum pun melibatkan interaksi dengan makhluk lain. Menggunakan kekuatan mantra dan niat (Bodhicitta) untuk menyeberangkan, membersihkan karma,& melatih kasih sayang.`
},

{
img:"img/wejangan4.jpg",
title:"Sutra Raja Agung Avalokitesvara",
content:`Sutra Raja Agung Avalokitesvara (Kao Wang Kuan Shi Yin Zhen Jing) yang dilafalkan di dalam sekte kita (True Buddha School) adalah sebuah kitab suci yang luar biasa.<br><br>
Kalian semua tahu bahwa dalam Aliran Tanah Suci (Jing Tu Zong), orang-orang melafalkan nama Buddha setiap hari, melafalkan 'Namo Amituofo', baik enam suku kata maupun empat suku kata.<br><br>
Namun, satu kitab Sutra Raja Agung Avalokitesvara ini setara dengan ringkasan/kumpulan dari seluruh pelafalan nama Buddha.<br><br>
Jika kamu melafalkan Sutra Raja Agung ini, kekuatannya melampaui pelafalan mereka selama seratus tahun.`,
makna:`Dorongan bagi para murid untuk menghargai dan tekun melafalkan Sutra Raja Agung Avalokitesvara, karena di dalamnya terkandung kekuatan seluruh Buddha yang mampu memberikan hasil spiritual yang luar biasa dalam waktu yang relatif singkat.`
},

{
img:"img/wejangan5.jpg",
title:"Berkah Terlahir sebagai Manusia",
content:`Buddha Sakyamuni pernah bersabda:<br><br>
Kita mampu terlahir di dunia Saha ini, mendapatkan tubuh manusia ini, dan pada saat yang sama dapat mendengarkan Dharma (Ajaran Buddha) serta mendengarkan Kebenaran, ini adalah berkah yang sangat besar.<br><br>
Setelah kamu mendapatkannya, jika kamu mampu benar-benar mendalami ajaran tersebut, memiliki kebijaksanaan sedalam samudra, dan mempelajari kebijaksanaan Sang Tathagata (Buddha), inilah yang disebut sebagai berkah yang tiada habisnya.`,
makna:`Dalam filosofi Buddhis, terlahir sebagai manusia dianggap sangat sulit dan langka, tetapi bisa bertemu dan mendengar ajaran kebenaran (Dharma) adalah berkah ganda. Pesan ini mengingatkan agar kita tidak menyia-nyiakan kesempatan hidup yang sekarang. Karena inilah satu-satunya harta (berkah) yang benar-benar bisa kita bawa selamanya.`
},

{
img:"img/wejangan6.jpg",
title:"Kekuatan Karma dan Kebiasaan",
content:`Ada orang bertanya kepadaku:<br><br>
Kejahatan yang diperbuat kakek-nenek, mengapa cucunya yang menerima balasannya (karma)? Sebab-akibat (Hukum Karma) macam apa ini? Di mana letak keadilan sebab-akibatnya?<br><br>
Saya menjawab:<br><br>
Cucu laki-laki itulah sang kakek, cucu perempuan itulah sang nenek. Tidakkah kamu memahami hubungan sebab-akibat dan balasan karma yang seperti ini?<br><br>
Orang-orang di dunia terlalu bodoh dan tidak sadar.<br>
Lintas generasi tetap tidak tercerahkan.<br>
Baru hari ini menyadari diri sendiri.<br>
Semuanya adalah perbuatan dari kehidupan lampau.<br>
Jika kehidupan sekarang tidak lagi melatih diri (berkultivasi).<br>
Kehidupan mendatang akan tetap sama seperti dulu.<br>
Memiliki anak cucu yang banyak.<br>
Hanya akan mengundang malapetaka di mana-mana.`,
makna:`Tidak ada karma yang salah sasaran, ini adalah tanggung jawab pribadi. Kita tidak bisa menyalahkan leluhur atau nasib, karena bisa jadi diri kita di masa lalulah yang membentuk kondisi kita sekarang. Cara untuk memutus lingkaran setan ini hanyalah dengan melatih diri dan berbuat kebajikan agar tidak mewariskan atau membawa kembali karma buruk di masa depan.`
},

{
img:"img/wejangan7.jpg",
title:"Sadhana ada pada Hati, bukan pada Formalitas",
content:`Artinya, dalam melatih diri, hal pertama yang harus dilakukan adalah menaklukkan hati. Secara lahiriah, kamu mungkin berpura-pura menunjukkan sikap menjaga sila (peraturan), perilaku tidak terlihat menyimpang, dan penampilan luar tampak agung serta suci.<br><br>
Namun, di dalam hati, kamu diam-diam masih terus memikirkan khayalan penuh nafsu keinginan.<br>
Hal seperti ini, di mata saya, bisa langsung terlihat jelas dalam sekali pandang.`,
makna:`Jangan hanya mengejar pengakuan orang lain dengan terlihat suci secara formalitas. Tuhan/Buddha/Semesta melihat apa yang ada di dalam hati, bukan apa yang dipamerkan di permukaan.`
},

{
img:"img/wejangan8.jpg",
title:"Cahaya Hati",
content:`Anda belajar Buddha, artinya harus melakukan praktik nyata (Sadhana).<br><br>
Anda harus mendapatkan 'Cahaya Hati' dalam dirimu sendiri agar terpancar keluar. Cahaya Hati milik Guru tidak mungkin bisa menyinari dirimu selamanya; kamu sendiri juga memiliki Cahaya Hati yang harus dipancarkan.<br><br>
Apa yang disebut sebagai 'Cahaya Hati muncul dengan sendirinya', adalah pelita yang kamu nyalakan sendiri, dan bukan pelita yang dinyalakan oleh Guru untukmu.`,
makna:`Jadilah "pelita bagi diri sendiri". Guru menunjukkan jalannya, tetapi kita sendirilah yang harus berjalan dan memastikan pelita di dalam hati kita menyala melalui kedisiplinan dalam melatih batin setiap hari.`
},
  
{
img:"img/wejangan9.jpg",
title:"Tidak Membeda-bedakan Makhluk",
content:`Di antara kau, aku, dan dia, siapa yang paling buruk?<br><br>

Sabda Bodhisattva:<br><br>

Jika ingin menyeberangkan (menyelamatkan) seluruh makhluk hidup hingga tiada yang tersisa,<br>
Tidak boleh membeda-bedakan yang baik.<br>
Tidak boleh membeda-bedakan yang buruk.<br><br>

Inilah perlindungan alam semesta yang tanpa pamrih (objektif).`,
makna:`Dalam pandangan manusia biasa, kita cenderung menghakimi: "Dia orang baik, saya bantu" atau "Dia orang jahat, biarkan saja". Jangan biarkan pikiran kita terjebak dalam penghakiman "baik" dan "buruk". Kasih sayang yang sejati adalah kasih sayang yang tidak pilih kasih, karena di mata kebenaran tertinggi, semua makhluk memiliki benih ke-Buddha-an yang sama.`
},

{
img:"img/wejangan10.jpg",
title:"Transmisi (Silsilah) adalah yang Paling Penting",
content:`Ikutlah denganku, tidak akan salah. Aku benar-benar dapat membimbing Anda mencapai Kebuddhaan (Buddha-phala).<br><br>

Jika berjodoh, ikutilah aku. Jika tidak berjodoh, Anda boleh pergi meninggalkan aku.<br><br>

Segala sesuatunya berjalan secara alami (natural). Aku tidak akan menyalahkan Anda, dan Anda pun jangan menyalahkan aku.`,
makna:`Hubungan spiritual harus didasari oleh kerelaan hati. Sang Guru menawarkan jalan menuju pencerahan, namun ia menyerahkan keputusan sepenuhnya kepada jodoh dan pilihan masing-masing orang dengan hati yang damai dan tanpa paksaan.`
}  
  
];

let index = 0;
const container = document.getElementById("container");
const total = wejanganData.length;

wejanganData.forEach((item,i)=>{
  container.innerHTML += `
  <div class="slide">
    <div class="card">
      <img src="${item.img}" class="img">
      <button onclick="toggleText(${i})" class="btn">🌐 Lihat Terjemahan</button>
      <button onclick="shareWA(${i})" class="btn">📤 Share ke WhatsApp</button>
      <div id="text${i}" class="hidden">
        <h3>${item.title}</h3>
        <p>${item.content}</p>
        <div class="makna">${item.makna}</div>
      </div>
    </div>
  </div>
  `;
});

function toggleText(i){
  document.getElementById("text"+i).classList.toggle("show");
}

function nextSlide(){
  if(index < total-1){
    index++;
    container.scrollTo({left: index * window.innerWidth});
    updateDots();
  }
}

function prevSlide(){
  if(index > 0){
    index--;
    container.scrollTo({left: index * window.innerWidth});
    updateDots();
  } else {
    window.location.href="index.html";
  }
}

function goHome(){
  window.location.href="index.html";
}

const dotsContainer = document.getElementById("dots");
for(let i=0;i<total;i++){
  let dot=document.createElement("span");
  dot.className="dot";
  dotsContainer.appendChild(dot);
}

function updateDots(){
  document.querySelectorAll(".dot").forEach((d,i)=>{
    d.classList.toggle("active", i===index);
  });
}
updateDots();

function toggleDark(){
  document.body.classList.toggle("dark");

  // simpan pilihan user
  if(document.body.classList.contains("dark")){
    localStorage.setItem("dark","true");
  } else {
    localStorage.setItem("dark","false");
  }
}

// load saat buka halaman
if(localStorage.getItem("dark") === "true"){
  document.body.classList.add("dark");
}  

function shareWA(i){
  const item = wejanganData[i];

  const text =
`Wejangan Harian 🌿

${item.title}

${item.content.replace(/<br>/g,"\n")}

Makna:
${item.makna}

Baca lengkap:
https://tinybless.my.id/wejangan.html`;

  const url = "https://wa.me/?text=" + encodeURIComponent(text);
  window.open(url, "_blank");
}  
</script>

</body>
</html>
