<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vihara Vidya Dharma Purnama</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
}

/* 🌸 BACKGROUND FIX (PNG - SUDAH BENAR) */
.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* overlay ringan biar teks kebaca */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.2);
z-index:-1;
}

/* container */
.container{
max-width:420px;
width:100%;
margin:auto;
padding:40px 20px;
text-align:center;
}

/* avatar */
.avatar{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
margin-bottom:14px;
border:3px solid #fff;
}

/* teks */
.nama-cn{
font-size:30px;
font-weight:700;
color:#ffffff;
letter-spacing:4px;
margin-bottom:4px;
text-shadow:0 2px 6px rgba(0,0,0,0.6);
}

.nama-id{
font-size:15px;
color:#ffffff;
margin-bottom:18px;
text-shadow:0 2px 6px rgba(0,0,0,0.6);
}

/* slider */
.slider{
overflow:hidden;
margin-bottom:20px;
}

.slider-track{
display:flex;
gap:10px;
animation:scroll 12s linear infinite;
}

.slider img{
width:95px;
height:95px;
object-fit:cover;
border-radius:14px;
border:2px solid #fff;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* tombol */
.btn{
position:relative;
display:flex;
align-items:center;
justify-content:center;

background:linear-gradient(180deg,#8be9ee,#2cc9d3);
border-radius:40px;
height:56px;
margin:14px 0;

font-weight:700;
color:#043c40;
text-decoration:none;

box-shadow:0 6px 18px rgba(0,0,0,0.4);
}

/* icon */
.icon{
position:absolute;
left:12px;
width:36px;
height:36px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:#fff;
}

/* warna icon */
.icon1{background:#ff9800;}
.icon2{background:#4caf50;}
.icon3{background:#e1306c;}
.icon4{background:#2196f3;}

/* map */
.map{
margin-top:20px;
}

.map iframe{
width:100%;
height:220px;
border:0;
border-radius:14px;
}

/* alamat */
.alamat{
margin-top:10px;
font-size:14px;
color:#ffffff;
text-shadow:0 2px 6px rgba(0,0,0,0.6);
}

/* footer */
.credit{
margin-top:25px;
font-size:12px;
color:#ffffff;
text-decoration:none;
}

</style>
</head>

<body>

<!-- 🌸 BG PASTI MUNCUL -->
<img src="img/bg-teratai.png" class="bg">

<!-- overlay -->
<div class="overlay"></div>

<div class="container">

<img src="img/avatar-kwan-im.jpg" class="avatar">

<div class="nama-cn">聞道雷藏寺</div>
<div class="nama-id">Vihara Vidya Dharma Purnama</div>

<div class="slider">
<div class="slider-track">
<img src="img/altar-utama.jpg">
<img src="img/bagi-takjil1.jpg">
<img src="img/bagi-takjil2.jpg">
<img src="img/altar-utama.jpg">
<img src="img/bagi-takjil1.jpg">
<img src="img/bagi-takjil2.jpg">
</div>
</div>

<a class="btn"><div class="icon icon1">📅</div>Jadwal Puja</a>
<a class="btn"><div class="icon icon2">🏯</div>Kegiatan Umat</a>
<a class="btn"><div class="icon icon3">📷</div>Instagram</a>
<a class="btn"><div class="icon icon4">📞</div>Hubungi Pengurus</a>

<!-- MAP -->
<div class="map">
<iframe src="https://maps.google.com/maps?q=Jln.%20Kantor%20No.%202%20A%20Cirebon&z=15&output=embed"></iframe>
</div>

<div class="alamat">
Jln. Kantor No. 2 A, Kota Cirebon<br>
Telp. (0231) 8805812
</div>

<a class="credit" href="https://tinybless.my.id">
by tinybless.my.id
</a>

</div>

</body>
</html>
