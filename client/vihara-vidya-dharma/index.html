<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vihara Vidya Dharma Purnama</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
}

/* BACKGROUND */

body{

background:
linear-gradient(#ffffffcc,#ffffffcc),
url("https://images.unsplash.com/photo-1524594154908-edd1e3fcb585");

background-size:cover;
background-position:center;

display:flex;
justify-content:center;
padding:40px 20px;

}

/* CONTAINER */

.container{
max-width:420px;
width:100%;
text-align:center;
}

/* AVATAR */

.avatar{
width:95px;
height:95px;
border-radius:50%;
object-fit:cover;
margin-bottom:14px;
border:3px solid white;
box-shadow:0 6px 16px rgba(0,0,0,0.2);
}

/* NAMA */

.nama{
font-size:22px;
font-weight:800;
color:#cfae6e;
margin-bottom:20px;
}

/* SLIDER */

.slider{
display:flex;
overflow-x:auto;
gap:10px;
margin-bottom:24px;
padding-bottom:5px;
}

.slider img{
width:110px;
height:110px;
border-radius:12px;
object-fit:cover;
flex-shrink:0;
}

/* BUTTON */

.btn{
display:block;
background:#f4e7c5;
border-radius:40px;
padding:16px;
margin:12px 0;

font-weight:700;
color:#5a4526;
text-decoration:none;

box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

/* MAP */

.map{
margin-top:20px;
}

.map iframe{
width:100%;
height:200px;
border:0;
border-radius:12px;
}

.alamat{
margin-top:10px;
font-size:14px;
color:#444;
}

/* FOOTER */

.credit{
display:block;
margin-top:30px;
font-size:11px;
color:#666;
text-decoration:none;
opacity:0.7;
}

</style>

</head>

<body>

<div class="container">

<!-- AVATAR -->

<img src="img/avatar-kwan-im.jpg" class="avatar">

<!-- NAMA -->

<div class="nama">
Vihara Vidya Dharma Purnama
</div>

<!-- SLIDER -->

<div class="slider">
<img src="img/altar-utama.jpg">
<img src="img/bagi-takjil1.jpg">
<img src="img/bagi-takjil2.jpg">
</div>

<!-- BUTTON -->

<a class="btn">Jadwal Puja</a> <a class="btn">Kegiatan Umat</a> <a class="btn">Instagram</a> <a class="btn">Hubungi Pengurus</a>

<!-- MAP -->

<div class="map">
<iframe src="https://maps.google.com/maps?q=vihara&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
</div>

<div class="alamat">
Alamat Vihara Vidya Dharma Purnama
</div>

<!-- FOOTER -->

<a class="credit" href="https://tinybless.my.id">
tinybless.my.id
</a>

</div>

</body>
</html>
