<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vihara Vidya Dharma Purnama</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
}

/* 🌸 BG LOTUS FOKUS TENGAH */
body{
min-height:100vh;

background:
linear-gradient(rgba(0,0,0,0.55),rgba(0,0,0,0.55)),
url("https://images.unsplash.com/photo-1501004318641-b39e6451bec6");

background-size:cover;
background-position:center center; /* fokus tengah */
background-repeat:no-repeat;

display:flex;
justify-content:center;
align-items:flex-start;

padding:40px 20px;
}

/* CONTAINER */
.container{
max-width:420px;
width:100%;
text-align:center;
}

/* AVATAR */
.avatar{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
margin-bottom:14px;
border:3px solid #fff;
}

/* TEXT */
.nama-cn{
font-size:30px;
font-weight:700;
color:#fff;
letter-spacing:4px;
margin-bottom:4px;
}

.nama-id{
font-size:15px;
color:#ddd;
margin-bottom:18px;
}

/* SLIDER */
.slider{
overflow:hidden;
margin-bottom:20px;
}

.slider-track{
display:flex;
gap:10px;
animation:scroll 12s linear infinite;
}

.slider img{
width:95px;
height:95px;
object-fit:cover;
border-radius:14px;
border:2px solid #fff;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* BUTTON */
.btn{
position:relative;
display:flex;
align-items:center;
justify-content:center;

background:linear-gradient(180deg,#8be9ee,#2cc9d3);
border-radius:40px;
height:56px;
margin:14px 0;

font-weight:700;
color:#043c40;
text-decoration:none;

box-shadow:0 6px 18px rgba(0,0,0,0.4);
}

/* ICON BULAT */
.icon{
position:absolute;
left:12px;

width:36px;
height:36px;
border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

color:#fff;
font-size:16px;

box-shadow:0 2px 6px rgba(0,0,0,0.3);
}

/* WARNA ICON */
.icon1{background:#ff9800;}
.icon2{background:#4caf50;}
.icon4{background:#2196f3;}

/* INSTAGRAM REAL */
.icon3{
background:linear-gradient(45deg,#feda75,#d62976,#962fbf,#4f5bd5);
}

.icon3 svg{
width:18px;
height:18px;
fill:white;
}

/* MAP */
.map iframe{
width:100%;
height:200px;
border:0;
border-radius:12px;
margin-top:20px;
}

/* ALAMAT */
.alamat{
margin-top:10px;
font-size:14px;
color:#fff;
line-height:1.5;
}

/* FOOTER */
.credit{
margin-top:25px;
font-size:12px;
color:#fff;
text-decoration:none;
}

</style>
</head>

<body>
