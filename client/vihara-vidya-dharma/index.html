<!DOCTYPE html>

<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vihara Vidya Dharma Purnama</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
}

/* BACKGROUND KOLAM TERATAI */

body{
background:
linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.4)),
url("https://images.unsplash.com/photo-1549880338-65ddcdfd017b");

background-size:cover;
background-position:center;

display:flex;
justify-content:center;
padding:40px 20px;
}

/* CONTAINER */

.container{
max-width:420px;
width:100%;
text-align:center;
}

/* AVATAR */

.avatar{
width:95px;
height:95px;
border-radius:50%;
object-fit:cover;
margin-bottom:16px;
border:3px solid #fff;
box-shadow:0 6px 18px rgba(0,0,0,0.6);
}

/* MANDARIN */

.nama-cn{
font-family:'Noto Serif SC', serif;
font-size:34px;
font-weight:700;
color:#fff;
letter-spacing:6px;
margin-bottom:6px;
}

/* INDONESIA */

.nama-id{
font-size:16px;
color:#ddd;
margin-bottom:20px;
}

/* SLIDER 1:1 */

.slider{
display:flex;
overflow-x:auto;
gap:12px;
margin-bottom:20px;
}

.slider img{
width:110px;
height:110px;
aspect-ratio:1/1;
object-fit:cover;
border-radius:14px;
flex-shrink:0;
border:2px solid #fff;
}

/* BUTTON AQUA */

.btn{
display:block;
background:#5fd0d8;
border-radius:40px;
padding:16px;
margin:12px 0;

font-weight:700;
color:#083c42;
text-decoration:none;

box-shadow:0 6px 20px rgba(0,0,0,0.4);
}

/* MAP */

.map iframe{
width:100%;
height:200px;
border:0;
border-radius:12px;
margin-top:20px;
}

.alamat{
margin-top:10px;
font-size:14px;
color:#fff;
}

/* FOOTER */

.credit{
margin-top:30px;
font-size:12px;
color:#fff;
opacity:0.8;
}

</style>

</head>

<body>

<div class="container">

<!-- AVATAR -->

<img src="img/avatar-kwan-im.jpg" class="avatar">

<!-- NAMA -->

<div class="nama-cn">聞道叢林寺</div>
<div class="nama-id">Vihara Vidya Dharma Purnama</div>

<!-- SLIDER -->

<div class="slider">
<img src="img/altar-utama.jpg">
<img src="img/bagi-takjil1.jpg">
<img src="img/bagi-takjil2.jpg">
</div>

<!-- BUTTON -->

<a class="btn">Jadwal Puja</a> <a class="btn">Kegiatan Umat</a> <a class="btn">Instagram</a> <a class="btn">Hubungi Pengurus</a>

<!-- MAP -->

<div class="map">
<iframe src="https://maps.google.com/maps?q=vihara&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
</div>

<div class="alamat">
Alamat Vihara Vidya Dharma Purnama
</div>

<!-- FOOTER -->

<div class="credit">
tinybless.my.id
</div>

</div>

</body>
</html>
