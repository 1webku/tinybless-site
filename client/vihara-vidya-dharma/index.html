<!DOCTYPE html>

<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vihara Vidya Dharma Purnama</title>

<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
}

/* BACKGROUND LOTUS (FIX) */

body{
background:
linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
url("https://images.unsplash.com/photo-1470163395405-d2b80e7450ed");

background-size:cover;
background-position:center;

display:flex;
justify-content:center;
padding:40px 20px;
}

/* CONTAINER */

.container{
max-width:420px;
width:100%;
text-align:center;
}

/* AVATAR */

.avatar{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
margin-bottom:14px;
border:3px solid #fff;
box-shadow:0 6px 18px rgba(0,0,0,0.6);
}

/* KALIGRAFI PROPORSIONAL */

.nama-cn{
font-family:'Ma Shan Zheng', cursive;
font-size:36px;
color:#fff;
letter-spacing:4px;
margin-bottom:6px;
}

/* INDONESIA */

.nama-id{
font-size:15px;
color:#ddd;
margin-bottom:18px;
}

/* SLIDER */

.slider{
display:flex;
gap:10px;
justify-content:center;
margin-bottom:20px;
}

.slider img{
width:95px;
height:95px;
object-fit:cover;
border-radius:14px;
border:2px solid #fff;
}

/* BUTTON */

.btn{
display:flex;
align-items:center;
justify-content:center;

background:linear-gradient(180deg,#8be9ee,#2cc9d3);
border-radius:40px;
padding:14px;
margin:12px 0;

font-weight:700;
color:#043c40;
text-decoration:none;

box-shadow:0 6px 20px rgba(0,0,0,0.4);
}

/* ICON BULAT */

.icon{
width:32px;
height:32px;
border-radius:50%;
margin-right:10px;

display:flex;
align-items:center;
justify-content:center;

font-size:14px;
color:white;
}

/* ICON COLORS */

.icon-puja{background:#ff9800;}
.icon-umat{background:#4caf50;}
.icon-ig{
background:linear-gradient(45deg,#feda75,#d62976,#962fbf,#4f5bd5);
}
.icon-telp{background:#2196f3;}

/* MAP */

.map iframe{
width:100%;
height:200px;
border:0;
border-radius:12px;
margin-top:20px;
}

/* ALAMAT (2 BARIS) */

.alamat{
margin-top:10px;
font-size:14px;
color:#fff;
line-height:1.5;
}

/* FOOTER */

.credit{
margin-top:25px;
font-size:12px;
color:#fff;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<img src="img/avatar-kwan-im.jpg" class="avatar">

<div class="nama-cn">聞道雷藏寺</div>
<div class="nama-id">Vihara Vidya Dharma Purnama</div>

<div class="slider">
<img src="img/altar-utama.jpg">
<img src="img/bagi-takjil1.jpg">
<img src="img/bagi-takjil2.jpg">
</div>

<a class="btn">
<div class="icon icon-puja">📅</div>
Jadwal Puja
</a>

<a class="btn">
<div class="icon icon-umat">🏯</div>
Kegiatan Umat
</a>

<a class="btn">
<div class="icon icon-ig">📷</div>
Instagram
</a>

<a class="btn">
<div class="icon icon-telp">📞</div>
Hubungi Pengurus
</a>

<div class="map">
<iframe src="https://maps.google.com/maps?q=Jln.%20Kantor%20No.%202%20A%20Cirebon&t=&z=15&ie=UTF8&iwloc=&output=embed"></iframe>
</div>

<div class="alamat">
Jln. Kantor No. 2 A, Kota Cirebon, Jawa Barat<br>
Telp. (0231) 8805812
</div>

<a class="credit" href="https://tinybless.my.id">
by tinybless.my.id
</a>

</div>

</body>
</html>
