<!DOCTYPE html>

<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vihara Vidya Dharma Purnama</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
}

/* BACKGROUND LOTUS (ONLINE) */

body{
background:
linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.35)),
url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");

background-size:cover;
background-position:center;

display:flex;
justify-content:center;
padding:40px 20px;
}

/* CONTAINER */

.container{
max-width:420px;
width:100%;
text-align:center;
}

/* AVATAR */

.avatar{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
margin-bottom:14px;
border:3px solid white;
box-shadow:0 6px 18px rgba(0,0,0,0.6);
}

/* NAMA */

.logo-nama{
width:100%;
max-width:280px;
margin:0 auto 20px;
}

/* SLIDER 1:1 */

.slider{
display:flex;
overflow-x:auto;
gap:10px;
margin-bottom:20px;
}

.slider img{
width:110px;
height:110px;
aspect-ratio:1/1;
border-radius:14px;
object-fit:cover;
flex-shrink:0;
border:2px solid rgba(255,255,255,0.6);
}

/* BUTTON AQUA */

.btn{
display:block;
background:#5fd0d8;
border-radius:40px;
padding:16px;
margin:12px 0;

font-weight:700;
color:#083c42;
text-decoration:none;

box-shadow:0 6px 20px rgba(0,0,0,0.4);
}

/* MAP */

.map iframe{
width:100%;
height:200px;
border:0;
border-radius:12px;
margin-top:20px;
}

.alamat{
margin-top:10px;
font-size:14px;
color:#fff;
}

/* FOOTER HITAM */

.credit{
display:block;
margin-top:30px;
font-size:12px;
color:#000;
background:rgba(255,255,255,0.7);
padding:6px 10px;
border-radius:10px;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<!-- AVATAR -->

<img src="img/avatar-kwan-im.jpg" class="avatar">

<!-- NAMA -->

<img src="img/nama-vihara.jpg" class="logo-nama">

<!-- SLIDER -->

<div class="slider">
<img src="img/altar-utama.jpg">
<img src="img/bagi-takjil1.jpg">
<img src="img/bagi-takjil2.jpg">
</div>

<!-- BUTTON -->

<a class="btn">Jadwal Puja</a> <a class="btn">Kegiatan Umat</a> <a class="btn">Instagram</a> <a class="btn">Hubungi Pengurus</a>

<!-- MAP -->

<div class="map">
<iframe src="https://maps.google.com/maps?q=vihara&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
</div>

<div class="alamat">
Alamat Vihara Vidya Dharma Purnama
</div>

<!-- FOOTER -->

<a class="credit" href="https://tinybless.my.id">
tinybless.my.id
</a>

</div>

</body>
</html>
