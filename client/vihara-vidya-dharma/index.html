<!DOCTYPE html>

<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vihara Vidya Dharma Purnama</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
}

/* BACKGROUND */

body{
background:url("img/bg-vihara.jpg") no-repeat center;
background-size:cover;
display:flex;
justify-content:center;
padding:40px 20px;
}

/* OVERLAY */

.container{
max-width:420px;
width:100%;
text-align:center;
backdrop-filter:blur(4px);
}

/* AVATAR */

.avatar{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
margin-bottom:14px;
border:3px solid white;
box-shadow:0 6px 16px rgba(0,0,0,0.4);
}

/* NAMA */

.logo-nama{
width:100%;
max-width:280px;
margin:0 auto 20px;
}

/* SLIDER */

.slider{
display:flex;
overflow-x:auto;
gap:10px;
margin-bottom:20px;
}

.slider img{
width:110px;
height:110px;
border-radius:12px;
object-fit:cover;
flex-shrink:0;
}

/* BUTTON */

.btn{
display:block;
background:#5fd0d8;
border-radius:40px;
padding:16px;
margin:12px 0;

font-weight:700;
color:#083c42;
text-decoration:none;

box-shadow:0 6px 18px rgba(0,0,0,0.25);
}

/* MAP */

.map iframe{
width:100%;
height:200px;
border:0;
border-radius:12px;
margin-top:20px;
}

.alamat{
margin-top:10px;
font-size:14px;
color:white;
}

/* FOOTER */

.credit{
display:block;
margin-top:30px;
font-size:12px;
color:#000;
text-decoration:none;
font-weight:600;
}

</style>

</head>

<body>

<div class="container">

<!-- AVATAR -->

<img src="img/avatar-kwan-im.jpg" class="avatar">

<!-- NAMA -->

<img src="img/nama-vihara.jpg" class="logo-nama">

<!-- SLIDER -->

<div class="slider">
<img src="img/altar-utama.jpg">
<img src="img/bagi-takjil1.jpg">
<img src="img/bagi-takjil2.jpg">
</div>

<!-- BUTTON -->

<a class="btn">Jadwal Puja</a> <a class="btn">Kegiatan Umat</a> <a class="btn">Instagram</a> <a class="btn">Hubungi Pengurus</a>

<!-- MAP -->

<div class="map">
<iframe src="https://maps.google.com/maps?q=vihara&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
</div>

<div class="alamat">
Alamat Vihara Vidya Dharma Purnama
</div>

<!-- FOOTER -->

<a class="credit" href="https://tinybless.my.id">
tinybless.my.id
</a>

</div>

</body>
</html>
