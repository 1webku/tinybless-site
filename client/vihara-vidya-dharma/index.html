<!DOCTYPE html>

<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vihara Vidya Dharma Purnama</title>

<!-- FONT MANDARIN -->

<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
}

/* BACKGROUND KOLAM TERATAI (REAL FEEL) */

body{
background:
linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.45)),
url("https://images.unsplash.com/photo-1524499982521-1ffd58dd89ea");

background-size:cover;
background-position:center;

display:flex;
justify-content:center;
padding:40px 20px;
}

/* CONTAINER */

.container{
max-width:420px;
width:100%;
text-align:center;
}

/* AVATAR */

.avatar{
width:95px;
height:95px;
border-radius:50%;
object-fit:cover;
margin-bottom:16px;
border:3px solid #fff;
box-shadow:0 8px 25px rgba(0,0,0,0.7);
}

/* MANDARIN KALIGRAFI */

.nama-cn{
font-family:'Ma Shan Zheng', cursive;
font-size:42px;
color:#fff;
letter-spacing:6px;
margin-bottom:6px;

text-shadow:
0 2px 6px rgba(0,0,0,0.8),
0 0 12px rgba(255,255,255,0.2);
}

/* INDONESIA */

.nama-id{
font-size:16px;
color:#ddd;
margin-bottom:20px;
}

/* SLIDER */

.slider{
overflow:hidden;
margin-bottom:20px;
}

.slider-track{
display:flex;
gap:12px;
animation:scroll 14s linear infinite;
}

.slider img{
width:110px;
height:110px;
aspect-ratio:1/1;
object-fit:cover;
border-radius:16px;
border:2px solid rgba(255,255,255,0.7);
}

/* ANIMATION */

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* BUTTON DENGAN ICON BULAT */

.btn{
display:flex;
align-items:center;
gap:12px;

background:linear-gradient(180deg,#9af0f5,#2fd1dc);
border-radius:40px;
padding:14px 18px;
margin:12px 0;

font-weight:700;
color:#043c40;
text-decoration:none;

box-shadow:
0 8px 25px rgba(0,0,0,0.5),
inset 0 3px 6px rgba(255,255,255,0.7);
}

/* ICON BULAT */

.icon{
width:34px;
height:34px;
border-radius:50%;
background:#ffffffcc;
display:flex;
align-items:center;
justify-content:center;
font-size:16px;
}

/* MAP */

.map iframe{
width:100%;
height:200px;
border:0;
border-radius:14px;
margin-top:20px;
}

.alamat{
margin-top:10px;
font-size:14px;
color:#fff;
}

/* FOOTER */

.credit{
margin-top:30px;
font-size:12px;
color:#fff;
opacity:0.9;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<!-- AVATAR -->

<img src="img/avatar-kwan-im.jpg" class="avatar">

<!-- NAMA -->

<div class="nama-cn">聞道雷藏寺</div>
<div class="nama-id">Vihara Vidya Dharma Purnama</div>

<!-- SLIDER -->

<div class="slider">
<div class="slider-track">

<img src="img/altar-utama.jpg">
<img src="img/bagi-takjil1.jpg">
<img src="img/bagi-takjil2.jpg">

<img src="img/altar-utama.jpg">
<img src="img/bagi-takjil1.jpg">
<img src="img/bagi-takjil2.jpg">

</div>
</div>

<!-- BUTTON -->

<a class="btn">
<div class="icon">📅</div>
Jadwal Puja
</a>

<a class="btn">
<div class="icon">🏯</div>
Kegiatan Umat
</a>

<a class="btn">
<div class="icon">📷</div>
Instagram
</a>

<a class="btn">
<div class="icon">📞</div>
Hubungi Pengurus
</a>

<!-- MAP (SUDAH SESUAI ALAMAT) -->

<div class="map">
<iframe src="https://maps.google.com/maps?q=Jln.%20Kantor%20No.%202%20A%20Cirebon&t=&z=15&ie=UTF8&iwloc=&output=embed"></iframe>
</div>

<div class="alamat">
Jln. Kantor No. 2 A, Kota Cirebon, Jawa Barat  
Telp. (0231) 8805812
</div>

<!-- FOOTER -->

<a class="credit" href="https://tinybless.my.id">
by tinybless.my.id
</a>

</div>

</body>
</html>
