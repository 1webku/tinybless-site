<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vihara Vidya Dharma Purnama</title>

<!-- FAVICON FIX -->
<link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png?v=2">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;}

body{
min-height:100vh;
background-image:url("img/bg-teratai.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
padding:40px 20px;
}

.container{max-width:420px;margin:auto;text-align:center;}

.avatar{
width:90px;height:90px;border-radius:50%;
object-fit:cover;margin-bottom:14px;border:3px solid #fff;
}

.nama-cn{
font-size:28px;font-weight:700;color:#fff;
letter-spacing:4px;margin-bottom:4px;
text-shadow:0 3px 10px rgba(0,0,0,0.7);
}

.nama-id{
font-size:15px;color:#fff;margin-bottom:18px;
text-shadow:0 3px 10px rgba(0,0,0,0.7);
}

/* SLIDER */
.slider{overflow:hidden;margin-bottom:20px;}
.slider-track{
display:flex;gap:10px;
animation:scroll 16s linear infinite;
}
.slider img{
width:95px;height:95px;
object-fit:cover;border-radius:14px;
border:2px solid #fff;
}
@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* BUTTON */
.btn{
position:relative;display:flex;
align-items:center;justify-content:center;

background:linear-gradient(180deg,#8be9ee,#2cc9d3);
border-radius:40px;height:56px;
margin:14px 0;font-weight:700;
color:#043c40;text-decoration:none;

box-shadow:0 6px 18px rgba(0,0,0,0.3);
}

.icon{
position:absolute;left:12px;
width:34px;height:34px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
color:#fff;
}

.icon1{background:#ff9800;}
.icon2{background:#4caf50;}
.icon4{background:#25D366;}
.icon5{background:#ff5722;}

.icon3{
background:linear-gradient(45deg,#feda75,#d62976,#962fbf,#4f5bd5);
}

.icon svg{width:18px;height:18px;fill:#fff;}

/* MAP */
.map{margin-top:20px;}
.map iframe{width:100%;height:220px;border:0;border-radius:12px;}

.alamat{
margin-top:12px;font-size:14px;color:#fff;
text-shadow:0 2px 6px rgba(0,0,0,0.6);
}

.credit{
display:block;margin-top:25px;
font-size:12px;color:#fff;opacity:0.8;
text-decoration:none;
}

/* MODAL */
.modal{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(6px);
display:none;align-items:center;justify-content:center;
z-index:999;
}

.modal-content{
background:#fff;
border-radius:16px;
padding:20px;
max-width:340px;width:90%;
text-align:center;
}

.modal h3{margin-bottom:10px;color:#043c40;}
.modal p{white-space:pre-line;color:#333;}

.close{
margin-top:12px;
background:#ccc;
padding:8px;
border-radius:8px;
cursor:pointer;
}

/* WA STYLE */
.wa-link{
display:block;
margin:10px 0;
padding:10px;
border-radius:10px;

background:rgba(37,211,102,0.15);
color:#25D366;
font-weight:600;
text-decoration:none;
}

.wa-link:hover{
background:#25D366;
color:#fff;
}

</style>
</head>

<body>

<div class="container">
