<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vihara Vidya Dharma Purnama</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
}

/* 🌸 BACKGROUND (IKUT SCROLL, PASTI MUNCUL) */
body{
min-height:100vh;

background-image:url("img/bg-teratai.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

padding:40px 20px;
}

/* CONTAINER */
.container{
max-width:420px;
margin:auto;
text-align:center;
}

/* AVATAR */
.avatar{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
margin-bottom:14px;
border:3px solid #fff;
}

/* TEXT */
.nama-cn{
font-size:28px;
font-weight:700;
color:#0d3b3f;
letter-spacing:4px;
margin-bottom:4px;
}

.nama-id{
font-size:15px;
color:#1f555a;
margin-bottom:18px;
}

/* SLIDER */
.slider{
overflow:hidden;
margin-bottom:20px;
}

.slider-track{
display:flex;
gap:10px;
animation:scroll 12s linear infinite;
}

.slider img{
width:95px;
height:95px;
object-fit:cover;
border-radius:14px;
border:2px solid #fff;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* BUTTON */
.btn{
position:relative;
display:flex;
align-items:center;
justify-content:center;

background:linear-gradient(180deg,#8be9ee,#2cc9d3);
border-radius:40px;
height:56px;
margin:14px 0;

font-weight:700;
color:#043c40;
text-decoration:none;

box-shadow:0 6px 18px rgba(0,0,0,0.3);
}

/* ICON */
.icon{
position:absolute;
left:12px;
width:34px;
height:34px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:#fff;
font-size:14px;
}

.icon1{background:#ff9800;}
.icon2{background:#4caf50;}
.icon3{background:#e1306c;}
.icon4{background:#2196f3;}

/* MAP */
.map{
margin-top:20px;
}

.map iframe{
width:100%;
height:220px;
border:0;
border-radius:12px;
}

/* ALAMAT */
.alamat{
margin-top:10px;
font-size:14px;
color:#0d3b3f;
line-height:1.5;
}

/* FOOTER */
.credit{
display:block;
margin-top:25px;
font-size:12px;
color:#0d3b3f;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<img src="img/avatar-kwan-im.jpg" class="avatar">

<div class="nama-cn">聞道雷藏寺</div>
<div class="nama-id">Vihara Vidya Dharma Purnama</div>

<div class="slider">
<div class="slider-track">

<img src="img/altar-utama.jpg">
<img src="img/bagi-takjil1.jpg">
<img src="img/bagi-takjil2.jpg">

<img src="img/altar-utama.jpg">
<img src="img/bagi-takjil1.jpg">
<img src="img/bagi-takjil2.jpg">

</div>
</div>

<a class="btn">
<div class="icon icon1">📅</div>
Jadwal Puja
</a>

<a class="btn">
<div class="icon icon2">🏯</div>
Kegiatan Umat
</a>

<a class="btn">
<div class="icon icon3">📷</div>
Instagram
</a>

<a class="btn">
<div class="icon icon4">📞</div>
Hubungi Pengurus
</a>

<div class="map">
<iframe src="https://maps.google.com/maps?q=Jln.%20Kantor%20No.%202%20A%20Cirebon&z=15&output=embed"></iframe>
</div>

<div class="alamat">
Jln. Kantor No. 2 A, Kota Cirebon, Jawa Barat<br>
Indonesia • Telp. (0231) 8805812
</div>

<a class="credit" href="https://tinybless.my.id">

</a>

</div>

</body>
</html>
