<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
}

/* BACKGROUND */
body{
min-height:100vh;

background-image:url("img/bg-teratai.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

padding:40px 20px;
}

/* CONTAINER */
.container{
max-width:420px;
margin:auto;
text-align:center;
}

/* AVATAR */
.avatar{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
margin-bottom:14px;
border:3px solid #fff;
}

/* JUDUL */
.nama-cn{
font-size:28px;
font-weight:700;
color:#ffffff;
letter-spacing:4px;
margin-bottom:4px;
text-shadow:0 3px 10px rgba(0,0,0,0.7);
}

.nama-id{
font-size:15px;
color:#ffffff;
margin-bottom:18px;
text-shadow:0 3px 10px rgba(0,0,0,0.7);
}

/* SLIDER */
.slider{
overflow:hidden;
margin-bottom:20px;
}

.slider-track{
display:flex;
gap:10px;
animation:scroll 12s linear infinite;
}

.slider img{
width:95px;
height:95px;
object-fit:cover;
border-radius:14px;
border:2px solid #fff;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* BUTTON */
.btn{
position:relative;
display:flex;
align-items:center;
justify-content:center;

background:linear-gradient(180deg,#8be9ee,#2cc9d3);
border-radius:40px;
height:56px;
margin:14px 0;

font-weight:700;
color:#043c40;
text-decoration:none;

box-shadow:0 6px 18px rgba(0,0,0,0.3);
}

/* ICON */
.icon{
position:absolute;
left:12px;
width:34px;
height:34px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:#fff;
}

/* WARNA ICON */
.icon1{background:#ff9800;}
.icon2{background:#4caf50;}
.icon4{background:#2196f3;}

/* INSTAGRAM */
.icon3{
background:linear-gradient(45deg,#feda75,#d62976,#962fbf,#4f5bd5);
}

.icon3 svg{
width:18px;
height:18px;
fill:#fff;
}

/* MAP */
.map{
margin-top:20px;
}

.map iframe{
width:100%;
height:220px;
border:0;
border-radius:12px;
}

/* ALAMAT */
.alamat{
margin-top:12px;
font-size:14px;
color:#ffffff;
line-height:1.6;
text-shadow:0 2px 6px rgba(0,0,0,0.6);
}

/* FOOTER */
.credit{
display:block;
margin-top:25px;
font-size:12px;
color:#ffffff;
text-decoration:none;
opacity:0.8;
}

</style>
</head>
