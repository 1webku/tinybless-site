<!DOCTYPE html>

<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vihara Vidya Dharma Purnama</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
}

/* BACKGROUND LOTUS (TANPA BANGUNAN) */

body{
background:
linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.45)),
url("https://images.unsplash.com/photo-1502082553048-f009c37129b9");

background-size:cover;
background-position:center;

display:flex;
justify-content:center;
padding:40px 20px;
}

/* CONTAINER */

.container{
max-width:420px;
width:100%;
text-align:center;
}

/* AVATAR */

.avatar{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
margin-bottom:14px;
border:3px solid #fff;
}

/* MANDARIN NORMAL */

.nama-cn{
font-size:30px;
font-weight:700;
color:#fff;
letter-spacing:4px;
margin-bottom:4px;
}

/* INDONESIA */

.nama-id{
font-size:15px;
color:#ddd;
margin-bottom:18px;
}

/* SLIDER AUTO 1:1 */

.slider{
overflow:hidden;
margin-bottom:20px;
}

.slider-track{
display:flex;
gap:10px;
animation:scroll 12s linear infinite;
}

.slider img{
width:95px;
height:95px;
aspect-ratio:1/1;
object-fit:cover;
border-radius:14px;
border:2px solid #fff;
}

/* ANIMASI */

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* BUTTON RAPI */

.btn{
position:relative;
display:flex;
align-items:center;
justify-content:center;

background:linear-gradient(180deg,#8be9ee,#2cc9d3);
border-radius:40px;
height:54px;
margin:12px 0;

font-weight:700;
color:#043c40;
text-decoration:none;

box-shadow:0 6px 18px rgba(0,0,0,0.4);
}

/* ICON BULAT DI KIRI UJUNG */

.icon{
position:absolute;
left:10px;

width:32px;
height:32px;
border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

color:#fff;
font-size:14px;
}

/* WARNA ICON */

.icon1{background:#ff9800;}
.icon2{background:#4caf50;}
.icon3{background:linear-gradient(45deg,#feda75,#d62976,#962fbf,#4f5bd5);}
.icon4{background:#2196f3;}

/* MAP */

.map iframe{
width:100%;
height:200px;
border:0;
border-radius:12px;
margin-top:20px;
}

/* ALAMAT */

.alamat{
margin-top:10px;
font-size:14px;
color:#fff;
line-height:1.5;
}

/* FOOTER */

.credit{
margin-top:25px;
font-size:12px;
color:#fff;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<img src="img/avatar-kwan-im.jpg" class="avatar">

<div class="nama-cn">聞道雷藏寺</div>
<div class="nama-id">Vihara Vidya Dharma Purnama</div>

<div class="slider">
<div class="slider-track">

<img src="img/altar-utama.jpg">
<img src="img/bagi-takjil1.jpg">
<img src="img/bagi-takjil2.jpg">

<img src="img/altar-utama.jpg">
<img src="img/bagi-takjil1.jpg">
<img src="img/bagi-takjil2.jpg">

</div>
</div>

<div class="icon icon1">📅</div>
Jadwal Puja
</a>

</a>

<a class="btn">
<div class="icon icon3">📷</div>
Instagram
</a>

<a class="btn">
<div class="icon icon4">📞</div>
Hubungi Pengurus
</a>

<div class="map">
<iframe src="https://maps.google.com/maps?q=Jln.%20Kantor%20No.%202%20A%20Cirebon&t=&z=15&ie=UTF8&iwloc=&output=embed"></iframe>
</div>

</html>
