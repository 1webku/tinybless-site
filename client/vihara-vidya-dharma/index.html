 },

<style>
/* CSS kamu dipertahankan */
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
body{min-height:100vh;background:url("img/bg-teratai.png") center/cover no-repeat;padding:40px 20px;}
.container{max-width:420px;margin:auto;text-align:center;}
.avatar{width:90px;height:90px;border-radius:50%;margin-bottom:14px;border:3px solid #fff;}
.nama-cn{font-size:28px;font-weight:700;color:#fff;text-shadow:0 3px 10px rgba(0,0,0,0.7);}
.nama-id{font-size:15px;color:#fff;margin-bottom:18px;text-shadow:0 3px 10px rgba(0,0,0,0.7);}

/* BUTTON */
.btn{
position:relative;display:flex;align-items:center;justify-content:center;
background:linear-gradient(180deg,#8be9ee,#2cc9d3);
border-radius:40px;height:56px;margin:14px 0;font-weight:700;
color:#043c40;text-decoration:none;cursor:pointer;
}

/* MODAL */
.modal{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;
z-index:999;
}

.modal-content{
background:#fff;border-radius:16px;padding:20px;width:90%;max-width:340px;
}

/* IMAGE */
.wejangan-img{
width:100%;border-radius:12px;margin-bottom:10px;cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1 style="display:none;">Vihara Vidya Dharma Purnama Cirebon</h1>

<img src="img/avatar-kwan-im.jpg" class="avatar" alt="Patung Kwan Im">

<div class="nama-cn">聞道雷藏寺</div>
<div class="nama-id">Vihara Vidya Dharma Purnama</div>

<!-- BUTTON -->
<a class="btn" onclick="openModal('puja')">📅 Jadwal Kebaktian</a>
<a class="btn" onclick="openModal('donasi')">💰 Donasi</a>
<a class="btn" onclick="openModal('kegiatan')">🏯 Kegiatan Umum</a>

<!-- ✅ WEJANGAN -->
<a class="btn" onclick="openWejangan()">📖 Wejangan Mula Guru</a>

<a class="btn" onclick="openModal('wa')">💬 Hubungi Pengurus</a>
<a class="btn" onclick="openModal('review')">⭐ Dukung Vihara</a>

</div>

<!-- MODAL LAMA -->
<div class="modal" id="modal">
<div class="modal-content" id="modalContent"></div>
</div>

<!-- MODAL WEJANGAN -->
<div class="modal" id="modalWejangan">
<div class="modal-content" id="wejanganContent"></div>
</div>

<script>

// MODAL LAMA
function openModal(type){
let c='';

if(type==='puja'){c=`<h3>Jadwal Kebaktian</h3><p>Minggu 14.30 WIB</p>`;}
if(type==='donasi'){c=`<h3>Donasi</h3><p>BCA 1341290088</p>`;}
if(type==='kegiatan'){c=`<h3>Kegiatan</h3><p>Senin & Rabu</p>`;}
if(type==='wa'){c=`<h3>WhatsApp</h3><p>Hubungi pengurus</p>`;}
if(type==='review'){c=`<h3>Review</h3><p>Bantu review Google</p>`;}

c += `<div onclick="closeModal()">Tutup</div>`;
document.getElementById("modalContent").innerHTML=c;
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

// WEJANGAN DATA
const wejanganData = [
{
judul:"Kematian Tidak Perlu Dipersiapkan",
img:"img/wejangan-1.jpg",
asli:"死亡不用準備",
indo:"Kematian tidak perlu dipersiapkan. Yang penting adalah hidup baik setiap hari.",
makna:"Persiapan sejati adalah latihan spiritual dan kebajikan setiap hari."
}
];

// LIST
function openWejangan(){
let html = `<h3>Pilih Wejangan</h3>`;

wejanganData.forEach((d,i)=>{
html += `<img src="${d.img}" class="wejangan-img" onclick="showWejangan(${i})">`;
});

html += `<div onclick="closeWejangan()">Tutup</div>`;

document.getElementById("wejanganContent").innerHTML = html;
document.getElementById("modalWejangan").style.display="flex";
}

// DETAIL
function showWejangan(i){
const d = wejanganData[i];

document.getElementById("wejanganContent").innerHTML = `
<h3>${d.judul}</h3>
<img src="${d.img}" class="wejangan-img">
<p>${d.indo}</p>
<hr>
<p>${d.makna}</p>
<div onclick="openWejangan()">Kembali</div>
`;
}

function closeWejangan(){
document.getElementById("modalWejangan").style.display="none";
}

</script>

</body>
</html>
