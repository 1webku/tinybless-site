<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UMKM Bio Link Demo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4e4376,#2b5876);
color:white;
text-align:center;
}

.container{
width:340px;
padding:20px;
}

.avatar{
width:110px;
height:110px;
border-radius:50%;
border:4px solid white;
margin-bottom:15px;
}

h1{
font-size:24px;
margin-bottom:5px;
}

.bio{
opacity:0.8;
margin-bottom:25px;
}

.link{
display:block;
background:white;
color:#333;
text-decoration:none;
padding:14px;
margin:12px 0;
border-radius:30px;
font-weight:500;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
transition:0.25s;
}

.link:hover{
transform:translateY(-3px);
box-shadow:0 12px 25px rgba(0,0,0,0.35);
}

</style>

</head>

<body>

<div class="container">

<img src="https://i.pravatar.cc/200" class="avatar">

<h1>Toko Online</h1>

<div class="bio">Produk Terbaik Harga Terjangkau</div>

<a class="link" href="#">Shopee Store</a>

<a class="link" href="#">Tokopedia Store</a>

<a class="link" href="#">Promo Hari Ini</a>

<a class="link" href="#">Testimoni Pelanggan</a>

<a class="link" href="#">Order WhatsApp</a>

</div>

</body>
</html>
