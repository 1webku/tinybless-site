<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hashtag Generator | TinyBless</title>

<style>

body{
font-family:Arial;
background:#0f2027;
color:white;
text-align:center;
padding:40px;
}

input{
padding:10px;
width:250px;
}

button{
padding:10px 20px;
border:none;
border-radius:20px;
background:#00ffcc;
margin-top:10px;
}

.result{
margin-top:20px;
background:white;
color:black;
padding:20px;
border-radius:10px;
}

</style>

</head>

<body>

<h1>Hashtag Generator</h1>

<p>Masukkan topik konten kamu.</p>

<input id="topic" placeholder="contoh: travel">

<br>

<button onclick="generate()">Generate</button>

<div id="result" class="result"></div>

<script>

function generate(){

let topic=document.getElementById("topic").value

document.getElementById("result").innerHTML=

"#"+topic+" #"+topic+"life #"+topic+"daily #"+topic+"lover #explore"+topic+" #viral"+topic

}

</script>

</body>
</html>
