<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TinyBless</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:#0f2027;
color:white;
text-align:center;
}

/* HERO */

.hero{
padding:60px 20px;
}

.avatar{
width:120px;
border-radius:50%;
border:4px solid white;
margin-bottom:15px;
}

.hero h1{
font-size:28px;
}

.hero p{
opacity:0.8;
margin-top:10px;
}

.cta{
display:inline-block;
margin-top:20px;
background:white;
color:black;
padding:12px 25px;
border-radius:30px;
text-decoration:none;
font-weight:500;
}

/* PORTFOLIO */

.portfolio{
padding:50px 20px;
}

.portfolio h2{
margin-bottom:25px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
max-width:500px;
margin:auto;
}

.grid img{
width:100%;
border-radius:10px;
}

/* LINKS */

.links{
padding:50px 20px;
}

.linkbtn{
display:block;
background:white;
color:black;
text-decoration:none;
padding:14px;
margin:10px auto;
max-width:300px;
border-radius:30px;
}

</style>

</head>

<body>

<!-- HERO -->

<div class="hero">

<img src="https://i.pravatar.cc/200" class="avatar">

<h1>TinyBless</h1>

<p>Chibi Creator & Digital Artist</p>

<a class="cta" href="#">Order Custom Illustration</a>

</div>

<!-- PORTFOLIO -->

<div class="portfolio">

<h2>My Portfolio</h2>

<div class="grid">

<img src="https://picsum.photos/300?1">
<img src="https://picsum.photos/300?2">
<img src="https://picsum.photos/300?3">
<img src="https://picsum.photos/300?4">

</div>

</div>

<!-- LINKS -->

<div class="links">

<h2>Connect With Me</h2>

<a class="linkbtn" href="#">TikTok</a>
<a class="linkbtn" href="#">Instagram</a>
<a class="linkbtn" href="#">Dreamstime Portfolio</a>
<a class="linkbtn" href="#">Contact WhatsApp</a>

</div>

</body>
</html>
