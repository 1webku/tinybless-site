<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Bio Link</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}

.container{
width:320px;
}

.avatar{
width:110px;
border-radius:50%;
border:4px solid white;
margin-bottom:15px;
}

h1{
font-size:22px;
margin-bottom:5px;
}

p{
opacity:0.8;
margin-bottom:25px;
}

.link{
display:block;
background:white;
color:#333;
text-decoration:none;
padding:14px;
margin:12px 0;
border-radius:30px;
font-weight:500;
transition:0.3s;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

.link:hover{
transform:scale(1.05);
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.footer{
margin-top:25px;
font-size:12px;
opacity:0.6;
}

</style>
</head>

<body>

<div class="container">

<img src="https://i.pravatar.cc/150" class="avatar">

<h1>TinyBless</h1>
<p>Chibi Creator & Digital Artist</p>

<a class="link" href="#">TikTok</a>
<a class="link" href="#">Instagram</a>
<a class="link" href="#">Dreamstime Portfolio</a>
<a class="link" href="#">Shop Digital Product</a>
<a class="link" href="#">Contact WhatsApp</a>

<div class="footer">
Made with GitHub Pages
</div>

</div>

</body>
</html>
